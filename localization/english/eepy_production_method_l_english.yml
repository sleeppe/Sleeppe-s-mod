l_english:

  # Production Methods
  
  pm_agroforestry:0 "Agroforestry"
  pm_agroforestry_desc:0 "Agroforestry is a land use management system in which trees or shrubs are grown around or among crops or pastureland. This integration of trees and shrubs into crop and animal farming systems creates environmental, economic, and social benefits. Agroforestry can enhance biodiversity, improve soil health, increase water retention, and provide additional income streams for farmers through the production of timber, fruits, nuts, and other tree products. By promoting sustainable land use practices, agroforestry contributes to climate change mitigation and adaptation while supporting food security and rural livelihoods."
  pm_american_cotton_farming:0 "American Cotton Farming"
  pm_american_cotton_farming_desc:0 "American cotton farming refers to the cultivation of cotton in the United States, which has historically been a major agricultural industry. Cotton is grown primarily in the southern states, where the climate is favorable for its growth. The farming process involves planting cotton seeds, nurturing the plants through irrigation and pest control, and eventually harvesting the cotton fibers. American cotton farming has evolved over time with advancements in technology and farming practices, leading to increased efficiency and productivity. However, it has also faced challenges such as labor issues and environmental concerns related to pesticide use and water consumption."
  agroforest_banana_plantation:0 "Agroforest Banana Plantation"
  agroforest_banana_plantation_desc:0 "An agroforest banana plantation combines the cultivation of bananas with the integration of trees and shrubs, creating a diverse and sustainable agricultural system. This approach enhances biodiversity, improves soil health, and increases water retention while providing additional income streams for farmers through the production of both bananas and other tree products."    
  pm_river_of_the_gods:0 "River of the Gods"
  pm_river_of_the_gods_desc:0 "The River of the Gods is a legendary waterway that is said to flow through the heart of a fertile and prosperous land. It is often associated with abundance, fertility, and the sustenance of life. In many cultures, the River of the Gods is believed to be a divine source of nourishment and prosperity, providing water for crops, supporting wildlife, and sustaining human communities. The concept of the River of the Gods symbolizes the interconnectedness of nature and humanity, highlighting the importance of water as a vital resource for agriculture and survival."
  pm_pizza_production:0 "Pizza Production"
  pm_pizza_production_desc:0 "Pizza production is the process of creating pizzas, which involves several steps including dough preparation, sauce making, topping selection, and baking. The process begins with mixing flour, water, yeast, and salt to create the pizza dough, which is then allowed to rise. Next, a tomato-based sauce is prepared using ingredients such as tomatoes, garlic, herbs, and spices. Once the dough has risen, it is rolled out and topped with the sauce, cheese, and various toppings such as vegetables, meats, and herbs. Finally, the pizza is baked in an oven until the crust is golden and the cheese is melted and bubbly. Pizza production can be done on a small scale in home kitchens or on a larger scale in commercial pizzerias and factories."
  pm_american_slave_clothes:0 "American Slave Clothes"
  pm_american_slave_clothes_desc:0 "American slave clothes were the garments created before the end of slavery when New England textile mills dominated the production of clothing for enslaved people. These clothes were often made from coarse, inexpensive fabrics such as cotton or wool and were designed to be durable and functional rather than fashionable.
  pm_agroforestry:0 "Agroforestry"
  pm_agroforestry_desc:0 "Agroforestry is a land use management system in which trees or shrubs are grown around or among crops or pastureland. This integration of trees and shrubs into crop and animal farming systems creates environmental, economic, and social benefits. Agroforestry can enhance biodiversity, improve soil health, increase water retention, and provide additional income streams for farmers through the production of timber, fruits, nuts, and other tree products. By promoting sustainable land use practices, agroforestry contributes to climate change mitigation and adaptation while supporting food security and rural livelihoods."