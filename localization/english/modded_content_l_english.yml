##Modded JE's

 #Dutch/Netherlands
 gay_diplo.1: "Belgium buys Dutch Government Bonds"
 gay_diplo.2: "Belgium bought Dutch Government Bonds"
 je_group_low_country_happenings:0 "Societal Changes"
 modifier_gateway_europe: "The Gateway To Europe Opened"
 je_rotterdam_port:0 "The Gateway to Europe?"
 je_rotterdam_port_reason:3 "With the recent surges in growth across the Contient, our beloved old Lady, Europe; and recent expasions of #yellow the Ports of Rotterdam #! we have essentially grown into a contiental trade hub that punches far above its weight.\nWe can use this newly found prominence to our leverage!\n\nBy opening our ports and making extensive use of new identification documents, we can surely convince many from overseas to move to the Netherlands and work here. We are few, so skilled foreignand especially cheap labour is a great for our economy. Let us make use of the two way tool that a Port is!"
 je_dutch_fiscal_crisis:0 "The Ailing Economy"
 je_dutch_fiscal_crisis_reason:3 "The Dutch have ignored the economic situation for too long.\nSince the decline of the spice trade's profitability, our trading empire has been brought to the brink of collapse. If we manage to give incentives to go to the stock market, and circulate our remaining wealth, we might be able to tackle our Issues..."
 je_group_dutch_fiscal_crisis: "A Looming Threat"
 je_dutch_fiscal_crisis_goal: "The [SCOPE.sCompany('amsterdam_company').GetName] has been profitable for 4 years."
 dutch_debt_addition.1.t: "#yellow The Economic Crisis Unfolds #!"
 dutch_debt_addition.1.d: "The Dutch Economy is ailing."
 dutch_debt_addition.1.f: ""#yellow This is the second biggest tragedy since the Tulpenwoede!#!" The people of the Netherlands scream for reform! Under the current conditions the Dutch Economy has been ailing for quite some time. If nothing is done now, a state bankruptcy ought to be imminent!"
 dutch_debt_addition.1.a: "What Should We do!?"
 modifier_financial_crisis: "Imminent Bankruptcy!"
 dutch_debt_addition.2.t: "Oranje Boven, Hail The Effectenbeurs!"
 dutch_debt_addition.2.d: "Thanks to our great and beloved Stockmarket, another National Tragedy, like the "Tulpenwoede", could be prevented!"
 dutch_debt_addition.2.f: "By refinancing the huge National Debt at a lower interest rate through the Effectenbeurs, the government managed to escape such a fate. Let us take advantage of our Stockmarket and prosper! Onwards, for the House of Orange!"
 dutch_debt_addition.2.a: "Let us usher in a new Golden Age!"
 modifier_golden_age_netherlands: "A New Golden Age"
 dutch_debt_addition.3.t: "The Deathbed of the Amsterdamse Effectenbeurs"
 dutch_debt_addition.3.d: "The Stock Exchange, which trusted upon the reimbursement of government loans, has now been tricked out of its money!"
 dutch_debt_addition.3.f: "Through one way or another, the loan repayments had been speculated away through the government, out of the hands of the stock exchange. This slashed a hole into its treasury, causing many private investors to be forced into bankruptcy, or leave the stock market altogether in some sort of maniacal attempt to save their profits. This only worsend the situation. Now the public trust into the institution has decreased. It will take a long time for more investors to enter the Exchange once again."
 dutch_debt_addition.3.a: "We cured the Boils, but at what cost..."
 modifier_naughty_netherlands: "The Stock Exchange Crashed!"

 #Italy
 je_central_italy: "The United Provinces of Central Italy"
 je_central_italy_reason: "The [GetCulture('north_italian').GetName] and [GetCulture('south_italian').GetName] states are spurred on by the nationalism of post-napoleonic Europe, and look towards a leader in their struggle to unite the peninsula. Perhaps by taking some initiative we can show the petty Kingdoms and Duchies that we are that leader, leading towards a unified peninsula under the banner of #yellow Italy"

 event_effects_central_italy.1_tt: "This will lead to Central Italy uniting with us, and a succession of events leading to much of Italy also unifying"
 central_italy.1.t: "The Declaration of Central Italy"
 central_italy.1.d: "The fervour of nationalism can be heard throughout the Italian peninsula as a delegation of newly elected representatives meet to discuss the future of Italy"
 central_italy.1.f: ""Signore, I say now or never! We must declare union with Sardinia, and make haste as to signal to the peoples of Italy where the winds are blowing""
 central_italy.1.a: "A triumph for the [GetCulture('north_italian').GetName] cause"

 central_italian_annexation.1.t: "The Annexation of Central Italy"
 central_italian_annexation.1.d: "The delegates in Central Italy have voted in favour of union with Sardinia"
 central_italian_annexation.1.f: ""I declare This the first step among many to the Risorgimento of Italy, momentous times are ahead!""
 central_italian_annexation.1.a: "Welcome them to the Nation"

 march_of_the_thousand.1.t: "The March of the Thousand"
 march_of_the_thousand.1.d: "A group of a thousand volenteers lands in Sicily, making their way up the peninsula to meet with [ROOT.GetCountry.GetAdjective] troops in the north, however throughout their journey thousands upon thousands of defectors join their ranks"
 march_of_the_thousand.1.f: ""Is it true? Are you those Piedmontian heroes we hear so much about? may i join you on your quest to unite Italy and restore glory to our lands!?""
 march_of_the_thousand.1.a: "And so the Mezzogiorno joins the fold"

 #poland
 POL_FLAVOR_TEXT:0 "Poland was dissolved during and after the Napoleonic wars, and ever since Russia has tightened its grip. After an uprising earlier this decade Polands autonomy was severely curtailed. Will Poland draw closer to russia, or will they take an independent path from their historic enemy?"

 law_sejmik_poland: "Local Sejmiks"
 law_sejmik_poland_desc: "Local parliaments have varying power over local affairs, increasing democracy and efficacy of governing, but coming at the cost of bureaucratic efficiency"

 geographic_region_poland: "Poland"

 je_polish_constitution: "The Matter of Poland"
 je_polish_constitution_lobby: "Poland stands defiant of the oppression imposed upon them by foreign empires. yet, their efforts have been quashed, and liberal reforms destroyed"
 je_polish_constitution_reason: "[ROOT.GetCountry.GetName] was a compromise invention, created in the Congress of Vienna to have one of the most liberal regimes in Europe in order to check the power of the russian Tsar. After a rebellion in 1830 Poland was stripped of practically all of its autonomy, and Russia continues to encroach on [ROOT.GetCountry.GetAdjectiveNoFlag] sovereignty. Yet the [ROOT.GetCountry.GetAdjectiveNoFlag] people yearn for independence, as well as a return to their liberal constitution. Perhaps we can attempt to undermine the Russians and reassert not only our constitution, but also a higher degree of autonomy."

 je_polish_constitution_button1: "Begin Reinstating the Constitution"
 je_polish_constitution_button1_desc: "The cornerstone of the constitution given to the poles at vienna was its extremely liberal views on suffrage, if we were to bring the vote back to the people, then perhaps we can begin to undermine the Tsar"

 je_polish_constitution_button2: "Bring Power Back to the Sejmiks"
 je_polish_constitution_button2_desc: "Local Sejmiks have historically been a unique quirk of polish democracy, by reinstating them we can not only bring democracy to the people, but also reinforce out independent governance from the Tsar"

 je_polish_constitution_button3: "Protect the Peasants"
 je_polish_constitution_button3_desc: "Despite Polands long history of democracy, this has not always served the common people. In order to protect the peasantry, we must place them under protection by the state: much alike the constituion of 1791"

 je_polish_constitution_button4: "Press for Krakow"
 je_polish_constitution_button4_desc: "Though we are unlikely to be successful, we must make an effort to reclaim our southern capital: if only for the national pride\n#red #bold NOTE THAT THIS MAY LEAD TO HIGHER AUTONOMY#! #! \n"

 law_state_serfs: "State Oversight"
 law_state_serfs_desc: "Peasants are nominally owned by their landholders, yet due to the intervention of the state they have the rights to quit work, are guaranteed working conditions and in many cases are allowed to homestead on spare plots of land"

 polish_constitution.1.t: "The Past and The Future"
 polish_constitution.1.d: "The people of poland are granted a constitution, but what will this entail?"
 polish_constitution.1.f: ""
 polish_constitution.1.a: "Keep the wealthy in charge"
 polish_constitution.1.b: "Power to the people!"

 polish_constitution.2.t: "Poland Requests a Constitution"
 polish_constitution.2.d: "The polish lobby for a constituion, if we are to get too distracted then perhaps we put our own balance of power at risk"
 polish_constitution.2.f: ""
 polish_constitution.2.a: "Sure, we ought not to get distracted when we have our own problems"
 polish_constitution.2.b: "Never\n#red (Nobles will gain strength)"

 polish_constitution.3.t: "Requesting Krakow"
 polish_constitution.3.d: "In an attempt to undermine Russian influence within our country we need to prove ourselves worthy of expanding our own nation. Annexing Krakow will greatly benefit us in this goal."
 polish_constitution.3.f: "Russian influence has grown far too strong in our nation"
 polish_constitution.3.a: "Let's hope Austria accepts"

 polish_constitution.4.t: "Poland Requests Krakow"
 polish_constitution.4.d: "Poland has seemingly approached us out of the blue with hopes of claiming our Polish subject. They say this is a move to undermine Russian influence in their country, but we're still skeptical of that. How should we reply?"
 polish_constitution.4.f: "This could benefit us in the future"
 polish_constitution.4.a: "Go ahead! We see no value in this land anyways."
 polish_constitution.4.b: "Hell no! #bold Krakow#! is ours to keep!"

 polish_constitution.5.t: "Austria Rejects our Porposal"
 polish_constitution.5.d: "Unfortunately for us, Austria has rejected our offer. We need to re-evaluate our foreign relations with them and attempt to find new allies to help us in the future."
 polish_constitution.5.f: "How dare they!? Do they wish for a war!?"
 polish_constitution.5.a: "Play the waiting game, one day Krakow will be ours!"

 polish_constitution.6.t: "Russia Intervenes in our Internal Affairs"
 polish_constitution.6.d: "Russia, afraid that our Constitution would lessen its influence, has decided to intervene in the signing of this Constitution, putting everything to a stop. Our hopes of higher autonomy are, for now, out of reach."
 polish_constitution.6.f: ""#italic Poland is not yet lost....#!""
 polish_constitution.6.a: "We shall play the waiting game, then"

 modifier_posen_assimilation: "Germanisation efforts"

 polish_constitution: "Reinstating the Polish Constitution"
 polish_constitution_desc: "After the loss of our autonomy in 1830, it is finally time for us to put our nation before the Russian interests and slowly begin reinstating what was once ours. We must do this carefully, though, for the Russians may attempt to stop us."

 modifier_signing_constitution: "Signing the Constitution"
 polish_constitution_button_cooldown_tt: "Has #b not#! passed a law in the past #v 360 days#!"
 je_polish_constitution_goal: "Has achieved all of the goals of the Constitution"
 russia_in_poland_tt: "#bold $RUS$ #! has prevented the signing of the Constitution"
 modifier_pol_failed_constitution: "Failed Constitution"

# CONGRESS OF PARIS JE
 je_congress_of_paris: "The Congress of Paris"
 je_congress_of_paris_reason: "The Great Powers have sent their delegations to Paris to decide on a solution to the unsolved crisis between Russia and the Ottoman Empire. \n\n#variable [GetGlobalVariable( 'je_congress_of_paris_participants_var' ).GetValue]#! [Concept('concept_great_power', '$concept_great_powers$')] are participating in the Congress.\n#bold #tooltippable #tooltip:favour_russia_button_desc $favour_russia_button$#!#!#! is backed by #variable [GetGlobalVariable( 'je_congress_of_paris_proposal_1' ).GetValue]#! total [concept_prestige]\n#bold #tooltippable #tooltip:favour_ottoman_button_desc $favour_ottoman_button$#!#!#! is backed by #variable [GetGlobalVariable( 'je_congress_of_paris_proposal_2' ).GetValue]#! total [concept_prestige]\n#bold #tooltippable #tooltip:the_romanian_solution_button_desc $the_romanian_solution_button$#!#!#! is backed by #variable [GetGlobalVariable( 'je_congress_of_paris_proposal_3' ).GetValue]#! total [concept_prestige]\n#bold #tooltippable #tooltip:wallachia_compromise_button_desc $wallachia_compromise_button$#!#!#! is backed by #variable [GetGlobalVariable( 'je_congress_of_paris_proposal_4' ).GetValue]#! total [concept_prestige]\n#bold #tooltippable #tooltip:favour_romania_button_desc $favour_romania_button$#!#!#! is backed by #variable [GetGlobalVariable( 'je_congress_of_paris_proposal_5' ).GetValue]#! total [concept_prestige]\n\nThe Congress will conclude in #variable [GetGlobalVariable('je_congress_of_paris_timer').GetValue]#! months. The proposal with the most prestige #tooltippable #tooltip:paris_treaty_voting_rules supporting#!#! it will then be selected as the Congress' offical solution.\n\n#Bold Result#!\nThe Congress has [ROOT.GetCountry.GetCustom('treaty_of_paris_coutcome')][ROOT.GetCountry.GetCustom('treaty_of_paris_acceptance_timer')]"
 je_congress_of_paris_tt_1: "The Congress has decided how to settle the Ottoman question."
 je_congress_of_paris_tt_2: "#v $RUS$#! has accepted the outcome of the Congress"
 je_congress_of_paris_tt_4: "#v [SelectLocalization(SCOPE.sCountry('ottoman').IsValid, SCOPE.sCountry('ottoman').GetName, 'dyn_c_ottoman_empire')]#! has accepted the outcome of the Congress"
