##Modded Laws
 
 law_dutch_provinces: "Grondwet: Vierde Hoofdstuk"
 law_dutch_provinces_desc: "The provincial States shall be constituted of representatives of the nobility, the towns, and the rural districts. The manner of election, the distribution of seats, and the organization of electoral bodies shall be regulated by royal authority, subject to prescribed provincial regulations. The King shall appoint commissioners in every province to preside over the assemblies and to supervise the faithful execution of the laws."

 law_mit_a_taxes: "Mit'a Taxes"
 law_mit_a_taxes_desc: "In Addition to normal taxes, all communities of the realm have to use labour as a taxed resource to build state projects and infrastructure. In return the State integrates those communities into it's fabric and provides food security and support in times of need."

 law_ayllu_kinship: "Ayllu Kinship"
 law_ayllu_kinship_desc: "Society is organised around the traditional Ayllu Communities. This system derives from the creation legend of the Ican Empire. Loyalty comes through communal bonds, which ensure cohesion. The state does not govern directly but rather interact with the Communities as a whole. That decreases the bureaucratic expenditure, while in turn limiting social mobility."

