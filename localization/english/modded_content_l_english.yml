 favour_ottoman_button_desc: "#v $WAL$#! and #v $MOL$#! are transfered to the #v $dyn_c_ottoman_empire$#! alongside the provinces of #bold Russian Dobrudja#! and #bold Russian Kars#!, #v $MOL$#! is granted the state of #bold Bessarabia#!"
