 je_vodka_monopoly: "The Vodka Monopoly"
 je_vodka_monopoly_reason: "Since Ivan the third, Vodka has been a state monopoly. Factually outlawing the domestic distillery of drink and making it a state enterprise to produce and sell Alcohol, predominantly Vodka. Selling Vodka at fix prices enables us to control the general populance and generate Russia great income. In 1765, Catherine the Great extended the privilege to Nobles, allowing them to distill drink on their own estates. The Vodka Monopoly is a vital tool for the Tsarist State, it is paramount to use it wisely.."

 revoking_privileges_button: "Revoke Privileges"
 revoking_privileges_button_desc: "Too long have the Nobles made a dime on the Vodka Monopoly. It is time to fully seize our tool!"

 grant_privilges_button: "Restore Catherinian Privileges"
 grant_privilges_button_desc: "To appease the Gentry, it has become time for them to regain the privileges promised to them under Catherine the Great in 1765."

 monastic_distillery_button: "Extend the Privilege to the Church"
 monastic_distillery_button_desc: "In an effort to improve state relations with the Devout, we ought to extend the right to distill drink to them and the monastaries, for they have always been brewing and distilling elsewhere. Let the clergy profit from our arrangement!"

 reducing_prices_button: "Reduce the Price of Drink!"
 reducing_prices_button_desc: "In an effort to appease the populance, we will lower drink prices."
 
 normalising_prices_button: "Normalise Pricing"
 normalising_prices_button_desc: "We shall restore the pricing of Vodka. Times of hardship are over, we don't need the peasantry to fall in line that much anymore. Let's get back to normalising and profiting."


 je_road_to_tsargorod: "Doroga v Tsargorod"
 je_road_to_tsargorod_reason: "The Ottoman Menace is to the South!\n\nLet the drums of war sound! Too long have the Muslims oppressed the virtuous Christians on the Balkan Peninsula. Our beloved Empress, long past, has decreed for all her sucessors to reconquer Constantinople for Christendom. It is in our interest to seize control of the City and it's periphery. We must decide if the current geopolitical situation allows us to acquire only Tsargorod, or if the road leading to the second Rome is ripe for the taking too."

 claims_tsargorod: "Claim Tsargorod"
 claims_tsargorod_desc: "We must remember the muslim Threat down yonder. Catherine the great proposed the Greek Project in the 1780s. It is now time we shall realise the plan. Let Moscow and Tsargorod rejoice, lets bring peace and freedom to the Orthodox people of the Balkan!"

 modifier_catherinian_legacy: "In the Footsteps of Giants"

 claims_black_sea_region: "Claim the Entirety of the Black Sea Coast"
 claims_black_sea_region_desc: "Catherine the great proposed a Greek Plan, to secure the safety and prosperity of Slavs and Orthodox Christians alike in the Balkans. We most expand on this Plan. In this day and age creating and independent State down south is futile. We instead must control the entirety of the Black Sea, to secure our own interests and crush the muslim meance!"
 
# EVENTS

 treaty_of_paris_events.1.t: "Peaceful Resolution to the Crisis?"
 treaty_of_paris_events.1.d: "As a result of the deteriorating diplomatic situation on the Black Sea between us and the Russians, the Great Powers of Europe have requested that both sides seek a peaceful resolution to this developing crisis. Should we refuse to accept this proposal and forward it to our Russian delegates, we risk upsetting the western Great Powers, which could lead to our country getting diplomatically isolated. Our government and people additionally fear the economic consequences of this crisis and our refusal to cooperate with the West."
 treaty_of_paris_events.1.f: "Our great nation is stuck between a rock and a hard place. Do we fight the Russians and antagonise the West or do we seek to restore peace in the region, potentially antagonising the Russians further?"
 treaty_of_paris_events.1.a: "Let's see what the Russians have to say about this."
 treaty_of_paris_events.1.b: "Screw them, we will fight and win this war!"

 treaty_of_paris_events.2.t: "A Diplomatic Solution?"
 treaty_of_paris_events.2.d: "Our aggressive manoeuvres in the Balkans have been noticed by the Great Powers of Europe. They and the Ottomans seem to be asking for a diplomatic end to this conflict. This goes against our goals of completely dominating the Black Sea, however, fighting this out may force the Great Powers to intervene on behalf of the Turks, which is not good for us. How should we proceed?"
 treaty_of_paris_events.2.f: "It is now up to the Tsar to make a choice. Peace or war? Which one shall it be?"
 treaty_of_paris_events.2.a: "Fine. Agree to a diplomatic resolution."
 treaty_of_paris_events.2.b: "Who do they think they are? War it is!"

 treaty_of_paris_events.3.t: "The Congress of Paris"
 treaty_of_paris_events.3.d: "The Ottoman Empire and the Russians have agreed to a diplomatic resolution to the crisis on the Black Sea. We are granted with the choice to send a delegate to this Congress, with the scope of voting on a possible solution to this crisis. Do we choose to attend or do we choose to ignore this event?"
 treaty_of_paris_events.3.f: "This is a great day for Europe! The Great Powers have chosen to negotiate, avoiding potential bloodshed for the sake of peace on the continent."
 treaty_of_paris_events.3.a: "Send a diplomat to Paris."
 treaty_of_paris_events.3.b: "This does not interest us."

 treaty_of_paris_events.4.t: "Paris Congress Concludes"
 treaty_of_paris_events.4.d: "The Great Powers of Europe have finally come to an agreement! As a result of their close cooperation and desire for regionla peace, an agreement was reached regarding the crisis on the Black Sea. This moment marks the end of a long period of negotiations which brings about a peaceful resolution to this crisis."
 treaty_of_paris_events.4.f: "This is a huge moment for Europe. Everyone worked together to achieve a lasting peace and to maintain a reasonable Balance of Power in the region."
 treaty_of_paris_events.4.a: "Peace in our times!"

 treaty_of_paris_events.5.t: "The Congress of Paris Fails!"
 treaty_of_paris_events.5.d: "The Great Powers of Europe have failed to reach a peaceful settlement to this crisis. This leaves the region prone to future conflict and crises. The failure of this Congress is a massive setback for peace in Europe and paints the Great Powers in a negative light. How will things develop from here?"
 treaty_of_paris_events.5.f: "This is a disaster for Europe! How did we fail like this!?"
 treaty_of_paris_events.5.a: "We must prepare for the future!"
 treaty_of_paris_explanation_tt: "#bold $RUS$#! agrees to negotiate with #bold $dyn_c_ottoman_empire$#! over the Black Sea crisis. The Great Powers of Europe may now agree to a peaceful settlement to the crisis"

