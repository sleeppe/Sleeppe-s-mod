#Note some locs are redundent and are in the future to be removed if not implemented
 rule_tesefalv_ai:0 "#d Distinctive Laws#!"
 setting_tesefalv_ai_on:0 "#v Enabled#!"
 setting_tesefalv_ai_on_desc:0 "#v Enable iw distinctive law variants, granting different nations unique flavor effects.#!"
 setting_tesefalv_ai_of:0 "#v Disabled#!"
 setting_tesefalv_ai_of_desc:0 "#v Disable iw distinctive law variants, hiding the laws while preserving the vanilla experience.#!"
 #变体法律
 law_egy_hedifuwangchao: "Khedivate"
 law_egy_hedifuwangchao_desc: "The autonomous dynasty of Egypt from the 19th to early 20th century, nominally under Ottoman suzerainty but effectively ruled by the descendants of Muhammad Ali with the title of Khedive, until Britain converted it into a Sultanate in 1914."
 law_egy_gemingzhihuiweiyuanhui: "Revolutionary Command Council"
 law_egy_gemingzhihuiweiyuanhui_desc: "The supreme governing body established by the Free Officers Movement after the Egyptian July Revolution of 1952, which overthrew the Farouk dynasty and, under the successive leadership of Naguib and Nasser, presided over the establishment of a republic and subsequent reforms."
 law_swe_renminzhijia: "Folkhemmet"
 law_swe_renminzhijia_desc: "A political vision articulated by the Swedish Social Democratic Party in the 1930s, conceiving the nation as a communal household and seeking to eliminate class antagonism and social inequality through universal welfare policies."
 law_yem_yadingziyougang: "Free Port of Aden"
 law_yem_yadingziyougang_desc: "A naturally deep-water harbor on the northern shore of the Gulf of Aden in southern Yemen, historically one of the most significant entrepôt trade centers in the Middle East. As a free economic zone, its strategic position connecting the Red Sea and the Indian Ocean made it a vital hub for regional cargo transshipment and warehousing."
 law_els_saerwaduo: "The Fourteen Families"
 law_els_saerwaduo_desc: "The fourteen principal oligarchic families that historically dominated El Salvador's political and economic life, deriving their wealth primarily from coffee cultivation and export. From the late 19th to early 20th century, they maintained a prolonged monopoly over land and power, forming a ruling elite known as 'Las Catorce Familias'."
 law_mex_alayajihua: "Plan of Ayala"
 law_mex_alayajihua_desc: "A political manifesto proclaimed by Emiliano Zapata during the Mexican Revolution in 1911, whose core demand was the restitution of lands to peasant communes and the expropriation and redistribution of illegally seized holdings."
 law_peu_alayajihua: "Aprismo"
 law_peu_alayajihua_desc: "The ideology of the American Popular Revolutionary Alliance of Peru, founded by Víctor Raúl Haya de la Torre, emphasizing anti-imperialism, Latin American solidarity, democratic socialism, and the advocacy of indigenous rights."
 law_afg_luoyazhierge: "Loya Jirga"
 law_afg_luoyazhierge_desc: "Afghanistan's traditional grand assembly, composed of tribal elders, dignitaries, and other notables, convened to decide on matters such as constitutional amendments, the election of a monarch, or major national affairs."
 law_arg_aiweitafa: "Ley Evita"
 law_arg_aiweitafa_desc: "The Argentine women's suffrage law enacted in 1947 under the impetus of Eva Perón, granting women political voting rights equal to those of men."
 law_arg_luokaxieding: "Roca–Runciman Agreement"
 law_arg_luokaxieding_desc: "A trade agreement signed between Argentina and the United Kingdom in 1933 (Note: 1967 refers to a later context, but the historical 'Roca Agreement' is the 1933 Roca–Runciman Pact), intended to strengthen bilateral economic cooperation but failing to resolve the sovereignty dispute over the Malvinas Islands."
 law_arg_saensi_peiniyafa: "Sáenz Peña Law"
 law_arg_saensi_peiniyafa_desc: "The Argentine electoral law enacted in 1912 that established universal, secret, and compulsory male suffrage, ending the oligarchic manipulation of public voting and inaugurating a genuine era of popular franchise."
 law_arg_zhengyizhuyi: "Justicialism"
 law_arg_zhengyizhuyi_desc: "The political doctrine founded by Juan Perón in Argentina, integrating nationalism, labor rights, social justice, and a 'Third Position', forming the ideological core of Peronism."
 law_aus_dengjiyihui: "Estates Diet"
 law_aus_dengjiyihui_desc: "The parliamentary system of the Habsburg Monarchy in Austria, organized according to estates such as clergy, nobility, and burghers, with each estate deliberating separately and exercising limited powers."
 law_aus_diguominzuyuyanpingdengling: "Imperial Ordinance on National Language Equality"
 law_aus_diguominzuyuyanpingdengling_desc: "An ordinance issued by Emperor Franz Joseph I of Austria-Hungary in 1849, granting equality to national languages in official matters, though its practical implementation remained limited."
 law_aus_habusibaowangchao: "House of Habsburg"
 law_aus_habusibaowangchao_desc: "One of Europe's most prominent feudal dynasties, which ruled over Austria, Spain, the Holy Roman Empire, and other territories for centuries, with Austria-Hungary representing its final phase."
 law_aus_huangjiahewangjiadifangfangweijun: "Imperial and Royal Landwehr"
 law_aus_huangjiahewangjiadifangfangweijun_desc: "The territorial defense forces within the Austro-Hungarian Army, with 'Imperial' designating the Austrian component and 'Royal' the Hungarian component, tasked with home defense."
 law_aus_lianbangxianfafa: "Federal Constitutional Law"
 law_aus_lianbangxianfafa_desc: "The Federal Constitutional Law of Austria passed in 1920, establishing Austria as a federal republic and laying the foundation for the modern Austrian political system."
 law_ast_aoxinjuntuan: "ANZAC"
 law_ast_aoxinjuntuan_desc: "Acronym for the Australian and New Zealand Army Corps, renowned for its role in the Gallipoli Campaign during World War I and subsequently emblematic of military cooperation and patriotic commemoration in both nations."
 law_ast_baiaozhengce: "White Australia Policy"
 law_ast_baiaozhengce_desc: "A series of historical Australian policies restricting non-white immigration, aimed at preserving a society dominated by Anglo-Saxon whites, ultimately replaced by multicultural policies from the 1970s onward."
 law_ast_zidiantingliceshi: "Dictation Test"
 law_ast_zidiantingliceshi_desc: "A language test introduced in Australia in 1909, whereby an immigration officer could arbitrarily select any European language from a dictionary for an applicant to transcribe, employed as a discretionary tool to obstruct non-white immigration."
 law_bel_gangguotexuzhuang: "Congo Charter"
 law_bel_gangguotexuzhuang_desc: "The charter of personal rule over the Congo Free State granted to King Leopold II of Belgium in 1885, making the Congo his private colony until its transfer to the Belgian government amid international outcry over atrocities."
 law_bel_tianzhujiaoziyoujiaoyu: "Catholic Free Education"
 law_bel_tianzhujiaoziyoujiaoyu_desc: "An educational concept promoted by the Catholic bloc in mid-20th-century Belgium, emphasizing that schools should be managed by the Church and provide free education grounded in Catholic values."
 law_bel_ziyoupaigonglijiaoyu: "Liberal Public Education"
 law_bel_ziyoupaigonglijiaoyu_desc: "The secular, state-controlled public education system advocated by Belgian liberals, which competed with Catholic education and advanced the separation of school and church."
 law_chi_yubeilixianzhi: "Preparatory Constitutionalism"
 law_chi_yubeilixianzhi_desc: "The Qing dynasty's announced constitutional reform program from 1906 to 1911, which sought to emulate constitutional monarchy to preserve dynastic rule but, due to its slow pace and perceived insincerity, failed to avert the dynasty's collapse."
 law_chi_hongxiandizhi: "Hongxian Monarchy"
 law_chi_hongxiandizhi_desc: "The short-lived monarchical regime established by Yuan Shikai between 1915 and 1916, in which he proclaimed himself the 'Hongxian Emperor', only to revoke the restoration after 83 days amid nationwide opposition."
 law_chi_wuquanxianfa: "Five-Power Constitution"
 law_chi_wuquanxianfa_desc: "The constitutional theory propounded by Sun Yat-sen, dividing governmental authority into five distinct powers—Executive, Legislative, Judicial, Examination, and Control—in order to harmonize popular sovereignty with governmental efficacy."
 law_chi_zhonggongzhongyangweiyuanhui: "Central Committee of the Communist Party of China"
 law_chi_zhonggongzhongyangweiyuanhui_desc: "The supreme leadership body of the Chinese Communist Party when the National Congress is not in session, composed of Central Committee members and responsible for the Party's day-to-day decision-making and administration."
 law_chi_zhaoyumizou: "Palace Memorials on Imperial Prisons"
 law_chi_zhaoyumizou_desc: "Confidential memorials submitted secretly to the emperor during the Ming and Qing dynasties, often concerning major judicial cases or intelligence, and frequently associated with the imperial prisons directly controlled by the sovereign."
 law_chi_jieshejihuilv: "Law on Associations and Assemblies"
 law_chi_jieshejihuilv_desc: "A regulation promulgated by the Qing government in 1908 that strictly curtailed freedom of association and assembly, aiming to prevent revolutionary activities and uphold autocratic rule."
 law_chi_tuanlian: "Tuanlian Militia"
 law_chi_tuanlian_desc: "Local irregular forces organized by gentry and officials in Qing China for maintaining order and suppressing rebellions, from which larger armies such as the Xiang Army and Huai Army evolved."
 law_chi_mintuan: "Mintuan Militia"
 law_chi_mintuan_desc: "Self-defense forces organized by villagers or landlords during the Republican era, responsible for local security and bandit suppression, often under the control of local authorities or gentry elites."
 law_chi_baqi: "Eight Banners"
 law_chi_baqi_desc: "The distinctive Manchu socio-military organization of the Qing dynasty, comprising the Plain Yellow, Bordered Yellow, and other banners, functioning simultaneously as military units and household registers and serving as the core pillar of Qing rule."
 law_chi_baoantuan: "Peace Preservation Corps"
 law_chi_baoantuan_desc: "Local security forces maintained by the Kuomintang during the Republican period, tasked with suppressing banditry, maintaining local order, and engaging in anti-communist operations."
 law_chi_zhuazhuangding: "Press-ganging of Conscripts"
 law_chi_zhuazhuangding_desc: "The forcible and often brutal conscription of able-bodied youths by the Kuomintang government during the Republican era, a practice that provoked widespread popular resentment and evasion."
 law_chi_xinjun: "New Army"
 law_chi_xinjun_desc: "The modernized army organized and trained by the late Qing dynasty with Western equipment and methods, originally intended to buttress the dynasty but ultimately a decisive force in overthrowing it during the 1911 Revolution."
 law_chi_guomingemingjun: "National Revolutionary Army"
 law_chi_guomingemingjun_desc: "The military arm of the Kuomintang established in 1925, which served as the main force in the Northern Expedition and later evolved into the armed forces of the Republic of China."
 law_chi_renminjiefangjun: "People's Liberation Army"
 law_chi_renminjiefangjun_desc: "The armed forces led by the Chinese Communist Party, which developed progressively after the Nanchang Uprising of 1927 and became the regular military of the People's Republic of China from 1949."
 law_chi_junjichu: "Grand Council"
 law_chi_junjichu_desc: "The central policy-making organ established during the Yongzheng reign of the Qing dynasty, composed of trusted high officials and supplanting the Grand Secretariat as the de facto supreme executive body."
 law_chi_xunzheng: "Political Tutelage"
 law_chi_xunzheng_desc: "The second of Sun Yat-sen's three revolutionary stages, following military rule and preceding constitutional government, during which the Kuomintang was to exercise one-party leadership while training the populace in political participation."
 law_chi_guomindangdahui: "National Congress of the Kuomintang"
 law_chi_guomindangdahui_desc: "The supreme authority of the Chinese Nationalist Party (Kuomintang), convened as a national assembly to formulate the party platform and elect central leadership bodies."
 law_chi_yidangzhiguo: "Party-State Doctrine"
 law_chi_yidangzhiguo_desc: "The political system of the Kuomintang era, which posited that the state should be administered under the guidance of the party's will, with party authority superseding governmental authority in a one-party dictatorship."
 law_chi_duodanghezuo: "Multi-Party Cooperation"
 law_chi_duodanghezuo_desc: "The system of multi-party cooperation and political consultation under the leadership of the Chinese Communist Party, wherein non-communist parties participate in political deliberation and democratic supervision within a non-competitive party framework."
 law_chi_zhonghuasuweiailaodongfa: "Labor Law of the Chinese Soviet Republic"
 law_chi_zhonghuasuweiailaodongfa_desc: "The labor statute promulgated by the Chinese Soviet Republic in 1931, mandating an eight-hour workday and minimum wages, though later adjusted due to its impracticality in the Soviet areas' actual conditions."
 law_chi_feichujianji: "Abolition of Degraded Status"
 law_chi_feichujianji_desc: "The policy enacted during the Yongzheng reign of the Qing dynasty that removed the 'mean people' from degraded household registers, granting them commoner status, though social discrimination persisted."
 law_chi_huagongpaiqian: "Dispatch of Chinese Laborers"
 law_chi_huagongpaiqian_desc: "The practice during the late Qing of sending indentured laborers to the Americas for railroad construction, and during the early Republic of sending approximately 140,000 laborers to Europe to support Allied logistics in World War I."
 law_chi_nubizhidu: "Institution of Bondservants"
 law_chi_nubizhidu_desc: "The institution in pre-modern China whereby bondservants were considered the private property of their masters, with limited legal standing; the Qing gradually restricted their sale and traffic, with formal abolition in the late Qing and early Republic."
 law_chi_zunkongdujing: "Veneration of Confucius and Study of the Classics"
 law_chi_zunkongdujing_desc: "The cultural policy by successive imperial rulers that exalted Confucius and the Confucian canon, continuing to be upheld as orthodox ideology for social order into the early Republic."
 law_chi_wuzugonghe: "Five Races Under One Union"
 law_chi_wuzugonghe_desc: "The ethnic policy slogan adopted at the founding of the Republic of China, advocating the equal union of the Han, Manchu, Mongol, Hui, and Tibetan peoples as the basis for national unity."
 law_chi_zhonghuaminzu: "Chinese Nation"
 law_chi_zhonghuaminzu_desc: "The encompassing term for all ethnic groups within China, articulated by modern intellectuals such as Liang Qichao to emphasize a pluralistic yet unified national community in the face of foreign encroachment."
 law_chi_tifayifu: "Queue Order and Change of Attire"
 law_chi_tifayifu_desc: "The early Qing decree compelling Han Chinese men to shave their foreheads and wear the Manchu queue while adopting Manchu dress, a measure intended to weaken Han resistance and consolidate Manchu hegemony."
 law_chi_zhongnongyishang: "Physiocratic Policy"
 law_chi_zhongnongyishang_desc: "The long-standing economic policy in imperial China that prioritized agriculture as the foundation of the state while denigrating commerce as a secondary pursuit, thereby restricting the status and activities of merchants to preserve a stable agrarian economy."
 law_chi_ziyuanweiyuanhui: "National Resources Commission"
 law_chi_ziyuanweiyuanhui_desc: "An agency established by the Nationalist Government in Nanjing in 1935, responsible for the development and management of strategic resources including heavy industry, energy, and ordnance, thereby laying a material foundation for the war of resistance."
 law_chi_guandushangban: "Official Supervision and Merchant Management"
 law_chi_guandushangban_desc: "The enterprise model employed during the Self-Strengthening Movement, whereby capital was provided by merchants while operations were supervised by government officials—exemplified by the China Merchants' Steam Navigation Company—occupying an intermediate position between state and private enterprise."
 law_chi_wukotongshang: "Five Treaty Ports"
 law_chi_wukotongshang_desc: "The five ports—Guangzhou, Xiamen, Fuzhou, Ningbo, and Shanghai—opened to foreign residence and trade under the 1842 Treaty of Nanjing."
 law_chi_lijinzhidu: "Likin System"
 law_chi_lijinzhidu_desc: "A transit tax on domestic goods instituted in the late Qing to raise military funds, which severely impeded interregional commerce and remained in effect until its abolition in 1931."
 law_chi_tongshui: "Consolidated Tax"
 law_chi_tongshui_desc: "A unified excise tax levied on industrial goods at the point of production by the Nationalist government during the Republican era, designed to simplify the tax structure and replace the likin system."
 law_chi_tonggoutongxiao: "Unified Purchase and Marketing"
 law_chi_tonggoutongxiao_desc: "The state monopoly system for the purchase and distribution of major agricultural products such as grain and cotton instituted in mainland China during the 1950s, aimed at guaranteeing supply and stabilizing prices."
 law_chi_didingying: "Land and Poll Tax Silver"
 law_chi_didingying_desc: "The combined land and head tax levied in silver following the Yongzheng reign's 'apportionment of the ding tax into the land tax', which simplified revenue collection and alleviated the fiscal burden on landless peasants."
 law_chi_gongliang: "Agricultural Tax in Kind"
 law_chi_gongliang_desc: "The in-kind agricultural tax delivered by peasants to the state, historically a crucial source of revenue and grain reserves for New China, until the comprehensive abolition of agricultural tax in 2006."
 law_chi_sishu: "Sishu Private Academy"
 law_chi_sishu_desc: "A traditional primary-level educational institution in pre-modern China, typically operated by a tutor in a household or ancestral hall, where young pupils studied Confucian classics before being gradually supplanted by modern-style schools in the late Qing."
 law_chi_dongxue: "Winter School"
 law_chi_dongxue_desc: "Short-term literacy classes held during the agricultural slack season in winter, a common form of mass education in revolutionary base areas and the early People's Republic for spreading basic literacy."
 law_chi_shuyuan: "Academy"
 law_chi_shuyuan_desc: "A scholarly and educational institution in imperial China, established either privately or officially, that served as a repository for books, a venue for lectures, and a center for scholarly compilation, becoming an important locus for Neo-Confucian dissemination from the Song dynasty onward."
 law_chi_xuetang: "Modern School"
 law_chi_xuetang_desc: "The designation for new-style schools in the late Qing and Republican periods, such as the 'Imperial University of Peking', which adopted Western curricula in distinction to traditional sishu and academies."
 law_chi_liuyangzisong: "Custody and Repatriation Allowance"
 law_chi_liuyangzisong_desc: "A leniency measure in Qing and earlier jurisprudence permitting aged, juvenile, or infirm convicts to remain in their native custody or be provided with travel funds for repatriation, reflecting the principle of penal clemency."
 law_chi_shengchanzijiu: "Self-Salvation Through Production"
 law_chi_shengchanzijiu_desc: "A policy directive mobilizing communities afflicted by disaster or hardship to rely on their own productive labor to overcome adversity."
 law_chi_sancongside: "Three Obediences and Four Virtues"
 law_chi_sancongside_desc: "The traditional Confucian moral strictures for women in imperial China: the 'Three Obediences' (to father before marriage, to husband after marriage, and to son in widowhood) and the 'Four Virtues' (morality, speech, appearance, and domestic skills)."
 law_chi_shangzhuochifan: "Sitting at the Table"
 law_chi_shangzhuochifan_desc: "In certain regions and clans historically, women were excluded from dining at the same table as men due to patriarchal norms; the revolutionary promotion of gender equality enabled women to gain family status including commensality."
 law_chi_baojiazhidu: "Baojia System"
 law_chi_baojiazhidu_desc: "A grassroots mutual surveillance and administrative system, employed from the Song dynasty through the Republican period, which organized households into units of ten (jia) and one hundred (bao) for collective security and policing."
 law_chi_gonganpaichusuo: "Public Security Police Substation"
 law_chi_gonganpaichusuo_desc: "The grassroots field office of China's public security apparatus, responsible for local public order, household registration, and dispute mediation."
 law_chi_gonganju: "Public Security Bureau"
 law_chi_gonganju_desc: "The functional department in charge of public security work at or above the prefectural level in China, bearing responsibilities that include criminal investigation, traffic management, and public order maintenance."
 law_chi_wuzhuangjingca: "People's Armed Police"
 law_chi_wuzhuangjingca_desc: "The People's Armed Police Force of China, a paramilitary organization tasked with internal security, counter-terrorism, stability maintenance, and emergency rescue."
 law_chi_enyin: "Yin Privilege"
 law_chi_enyin_desc: "The system in imperial China whereby the sons or grandsons of high-ranking officials could enter the civil service through hereditary entitlement, a practice particularly prevalent in the Song dynasty and continued through the Ming and Qing."
 law_chi_juanna: "Purchase of Office"
 law_chi_juanna_desc: "The practice in imperial China permitting private individuals to obtain official rank or examination degrees through monetary contributions to the state, a system that became rampant during the Qing and exacerbated official corruption."
 law_chi_dangguanganbu: "Party Supervision of Cadres"
 law_chi_dangguanganbu_desc: "The organizational principle of the Chinese Communist Party whereby the Party exercises unified management over the selection, appointment, assessment, and oversight of cadres, constituting the core of the cadre personnel system."
 law_chi_yiminshibian: "Migration for Frontier Consolidation"
 law_chi_yiminshibian_desc: "The Qing policy of encouraging or coercing settlement of the interior population in border regions such as Manchuria and Xinjiang for the purpose of frontier defense and reclamation."
 law_chi_tungengshubian: "Military-Agricultural Colonization"
 law_chi_tungengshubian_desc: "The strategy of stationing troops or settlers to cultivate wasteland and garrison border areas, thereby integrating agricultural production with military defense."
 law_chi_bianjiangjianshebingtuan: "Border Construction Corps"
 law_chi_bianjiangjianshebingtuan_desc: "Refers to organizations such as the Xinjiang Production and Construction Corps, which perform combined agricultural, industrial, and military functions in fulfillment of the mission of military-agricultural colonization."
 law_chi_jiumentidu: "Commandant of the Nine Gates"
 law_chi_jiumentidu_desc: "The colloquial title for the Commandant of the Gendarmerie in the Qing dynasty, who was responsible for guarding the nine gates of the Beijing city wall and maintaining public order and policing within the capital."
 law_chi_juntong: "Bureau of Investigation and Statistics"
 law_chi_juntong_desc: "The abbreviated name for the 'Bureau of Investigation and Statistics of the Military Affairs Commission' of the Kuomintang, which conducted military intelligence and covert operations and was reorganized as the Secrecy Bureau of the Ministry of National Defense in 1946."
 law_chi_zhongtong: "Central Bureau of Investigation and Statistics"
 law_chi_zhongtong_desc: "The abbreviated name for the 'Central Executive Committee Bureau of Investigation and Statistics' of the Kuomintang, responsible for party intelligence and anti-communist operations, and dissolved in 1949."
 law_chi_zhongdiaobu: "Central Investigation Department"
 law_chi_zhongdiaobu_desc: "The Central Investigation Department of the Chinese Communist Party, charged with intelligence and security matters, which was merged into other agencies after the establishment of the People's Republic."
 law_chi_linshiyuefa: "Provisional Constitution"
 law_chi_linshiyuefa_desc: "The 'Provisional Constitution of the Republic of China' promulgated in 1912, which was China's first bourgeois constitutional document, establishing the separation of powers and a responsible cabinet system."
 law_chi_hujizhidu: "Household Registration System"
 law_chi_hujizhidu_desc: "China's long-standing system for managing population, verifying identity, and assessing taxes and labor service; in its modern form it categorizes households as agricultural or non-agricultural and for a long period restricted freedom of movement."
 law_chi_hangbang: "Guild"
 law_chi_hangbang_desc: "Mutual-aid associations formed by merchants and artisans of the same trade or native place in pre-modern Chinese cities, akin to guilds, which protected members' interests through the promulgation of trade regulations."
 law_chi_erwujianzu: "Twenty-Five Percent Rent Reduction"
 law_chi_erwujianzu_desc: "A rent-reduction policy implemented by both the Kuomintang and the Communist Party in certain regions during the 1920s, stipulating that tenant rents be reduced by 25% from the original contractual amount."
 law_chi_jianzujianxi: "Reduction of Rent and Interest"
 law_chi_jianzujianxi_desc: "The land policy enacted by the Chinese Communist Party in its base areas during the Second Sino-Japanese War, which reduced land rents and loan interest rates to alleviate peasant burdens and consolidate a united front against Japan."
 law_chi_gengzheyouqitian: "Land to the Tiller"
 law_chi_gengzheyouqitian_desc: "Sun Yat-sen's stated goal of equalization of land rights, which subsequently became the core principle of the Chinese Communist Party's land reform, enabling landless and land-poor peasants to acquire ownership of farmland."
 law_chi_sanminzhuyi: "Three Principles of the People"
 law_chi_sanminzhuyi_desc: "The doctrine of nationalism, democracy, and people's livelihood formulated by Sun Yat-sen, which served as the guiding ideology of the Kuomintang in the National Revolution."
 law_ger_weimaxianfa: "Weimar Constitution"
 law_ger_weimaxianfa_desc: "The democratic constitution of the German Weimar Republic promulgated in 1919, which established a parliamentary system alongside a strong presidency but was exploited by the Nazis due to its emergency provisions."
 law_ger_nacuizhuyi: "Nazism"
 law_ger_nacuizhuyi_desc: "National Socialism, an extreme reactionary ideology advocating racial superiority, dictatorial leadership, and territorial expansion, which underpinned Hitler's rule over Germany."
 law_ger_shubaojianchaling: "Censorship Ordinance"
 law_ger_shubaojianchaling_desc: "Decrees mandating prior censorship of publications in German history, utilized by the Nazi regime to control public opinion and suppress dissent."
 law_ger_pulushijunguantuan: "Prussian Officer Corps"
 law_ger_pulushijunguantuan_desc: "The aristocratic officer caste of Prussia and the German Empire, which revered martial tradition and loyalty and exerted a profound influence on German politics."
 law_ger_lianbangguofangjun: "Bundeswehr"
 law_ger_lianbangguofangjun_desc: "The regular armed forces of West Germany established in 1955 and subsequently of unified Germany, operating under parliamentary oversight and tasked primarily with defense."
 law_ger_guojiarenminjun: "National People's Army"
 law_ger_guojiarenminjun_desc: "The armed forces of the German Democratic Republic, in existence from 1956 to 1990 and affiliated with the Warsaw Pact."
 law_ger_lingxiuyuanze: "Führerprinzip"
 law_ger_lingxiuyuanze_desc: "The core organizational principle of the Nazi Party, stipulating the absolute authority of the Führer and the unconditional obedience of subordinates, applicable to both state and party structures."
 law_ger_sanjixuanjuzhi: "Three-Class Franchise"
 law_ger_sanjixuanjuzhi_desc: "The inequitable electoral system employed in Prussia from 1849 to 1918, which divided voters into three classes based on tax contributions to ensure the predominance of the wealthy."
 law_ger_nacuidang: "Nazi Party"
 law_ger_nacuidang_desc: "The National Socialist German Workers' Party, which governed Germany from 1933 to 1945, instituting Nazism, launching World War II, and perpetrating genocide."
 law_ger_tongyishehuidang: "Socialist Unity Party"
 law_ger_tongyishehuidang_desc: "The ruling party of East Germany, formed in 1946 through the merger of the Communist and Social Democratic parties, which governed the GDR until German reunification in 1990."
 law_ger_laogongzhenxian: "German Labour Front"
 law_ger_laogongzhenxian_desc: "The official Nazi organization that replaced trade unions, purporting to protect workers while functioning as an instrument of labor control and strike prohibition."
 law_ger_laozijuejuezhi: "Co-determination"
 law_ger_laozijuejuezhi_desc: "The post-war German system of industrial relations granting worker representatives participation in supervisory board decision-making alongside capital."
 law_ger_jizhongying: "Concentration Camp"
 law_ger_jizhongying_desc: "Facilities established by Nazi Germany for the internment of Jews, political prisoners, and other targeted groups, where forced labor and mass extermination were carried out, as exemplified by Auschwitz."
 law_ger_niulunbaofaan: "Nuremberg Laws"
 law_ger_niulunbaofaan_desc: "Antisemitic legislation enacted by Nazi Germany in 1935, which stripped Jews of German citizenship and prohibited marriage or sexual relations between Jews and non-Jews."
 law_ger_xueyutu: "Blood and Soil"
 law_ger_xueyutu_desc: "A Nazi ideological slogan emphasizing the bond between Germanic blood and the native soil, employed to justify eastward expansion and the displacement of indigenous populations."
 law_ger_sinianjihua: "Four-Year Plan"
 law_ger_sinianjihua_desc: "The economic and military program initiated by Nazi Germany in 1936, aiming to achieve wartime self-sufficiency and accelerate rearmament within four years."
 law_ger_xitelexuexiao: "Adolf Hitler Schools"
 law_ger_xitelexuexiao_desc: "Elite educational institutions established by Nazi Germany to groom future leaders, enrolling racially qualified adolescents and indoctrinating them in National Socialist ideology."
 law_ger_zhixujingcha: "Ordnungspolizei"
 law_ger_zhixujingcha_desc: "The uniformed regular police force of Nazi Germany responsible for routine public order, which also participated in deportations and massacres in occupied territories."
 law_ger_dangweidui: "Schutzstaffel"
 law_ger_dangweidui_desc: "The elite paramilitary organization of the Nazi Party, originally Hitler's personal bodyguard, which expanded into a vast apparatus controlling the police, concentration camps, and intelligence services."
 law_ger_feijunshiqu: "Demilitarized Zone"
 law_ger_feijunshiqu_desc: "The Rhineland region of Germany designated under the Treaty of Versailles as an area where military forces and fortifications were prohibited, a provision violated by Hitler in 1936."
 law_ger_shengcunkongjian: "Lebensraum"
 law_ger_shengcunkongjian_desc: "The central concept of Nazi expansionist policy, advocating the acquisition of land and resources in Eastern Europe for the habitation and development of the Germanic people."
 law_ger_gaishitaibao: "Gestapo"
 law_ger_gaishitaibao_desc: "The secret state police of Nazi Germany, operating outside judicial constraint and charged with suppressing opposition and hunting down Jews."
 law_ger_sitaxi: "Stasi"
 law_ger_sitaxi_desc: "The Ministry for State Security of East Germany, which exercised pervasive surveillance and repressive control over society, ranking among the Warsaw Pact's most formidable secret police agencies."
 law_ger_kegongzhaomu: "Gastarbeiter Recruitment"
 law_ger_kegongzhaomu_desc: "The post-World War II policy of West Germany to recruit temporary foreign laborers, primarily from Turkey and Italy, to alleviate labor shortages, thereby contributing to the formation of a multicultural society."
 law_bhu_wangchukewangchao: "Wangchuck Dynasty"
 law_bhu_wangchukewangchao_desc: "The current hereditary monarchy of Bhutan, founded in 1907 by Ugyen Wangchuck, which brought an end to the prolonged theocratic and factional strife and continues to reign to this day."
 law_bhu_zhubagaju: "Drukpa Kagyu"
 law_bhu_zhubagaju_desc: "A major branch of the Kagyu school of Tibetan Buddhism, which became the state religion of Bhutan from the 16th century onward and has profoundly shaped the country's religious, cultural, and political traditions."
 law_bhu_zongweidui: "Dzong Guards"
 law_bhu_zongweidui_desc: "The local military forces historically responsible for defending the various Dzongs throughout Bhutan, which gradually evolved into the precursor of the national standing army."
 law_nep_shaawangchao: "Shah Dynasty"
 law_nep_shaawangchao_desc: "The last monarchical dynasty in the history of Nepal, founded in 1768 by Prithvi Narayan Shah following the unification of Nepal, and abolished in 2008."
 law_nep_lanatizhi: "Rana Regime"
 law_nep_lanatizhi_desc: "The oligarchic system of hereditary prime ministership exercised by the Rana family in Nepal from 1846 to 1951, during which the monarchy was reduced to a figurehead and the Rana prime ministers held autocratic control over military and civil affairs."
 law_nep_haliyazhi: "Haliya System"
 law_nep_haliyazhi_desc: "A semi-feudal labor system in Nepalese history whereby peasants provided labor to landlords in exchange for land-use rights or debt repayment, effectively constituting a form of bonded labor."
 law_nep_jiubaihaofaling: "Decree 900"
 law_nep_jiubaihaofaling_desc: "The agrarian reform law enacted by Guatemala in 1952, which aimed to redistribute large tracts of uncultivated land to landless peasants but provoked opposition by affecting the interests of major landowners including the United Fruit Company."
 law_sik_quejiafawang: "Dharma King"
 law_sik_quejiafawang_desc: "'Chogyal' means 'Dharma King' and was the title of the hereditary monarch of the Kingdom of Sikkim. This system began in 1642, marking the establishment of theocratic rule, and continued until the kingdom was annexed by India in 1975."
 law_sik_shierdachenghuiyi: "Council of Twelve Ministers"
 law_sik_shierdachenghuiyi_desc: "This was the highest administrative and advisory body chaired by the king at the founding of the Kingdom of Sikkim, responsible for assisting in the governance of the state."
 law_sik_difangtouren: "Pipon"
 law_sik_difangtouren_desc: "This is a generic term for the grass-roots ruling nobles of the Kingdom of Sikkim, who possessed hereditary estates and exercised administrative and judicial powers within their jurisdictions."
 law_sik_jiuchengpanjiao: "Nine-Yana Doctrinal Classification"
 law_sik_jiuchengpanjiao_desc: "This is the core doctrinal classification system of the Nyingma school of Tibetan Buddhism. It systematically divides Buddhist teachings into nine progressive levels, providing a complete path of practice for practitioners."
 law_sik_yilakadaer: "Ilakadars"
 law_sik_yilakadaer_desc: "This is a generic term for the class of hereditary feudal lords such as Kazis and Thikadars in the Kingdom of Sikkim. They constituted the actual ruling stratum of the kingdom."
 law_bht_tubangzhi: "Princely State"
 law_bht_tubangzhi_desc: "A system of nominally autonomous territories in colonial India ruled by local princes who accepted British paramountcy. The princely states enjoyed limited internal autonomy but were subject to the supervision of British Residents."
 law_bht_luolatefa: "Rowlatt Act"
 law_bht_luolatefa_desc: "A repressive law enacted by the British colonial government in 1919, authorizing the colonial authorities to arrest and imprison Indian revolutionaries without trial. It directly triggered nationwide protests and the Amritsar Massacre."
 law_bht_yingyinlujun: "British Indian Army"
 law_bht_yingyinlujun_desc: "The colonial army of India during the period of British rule, composed primarily of Indian soldiers under the command of British officers. It was a crucial force for maintaining British dominance in South Asia and served in both World Wars."
 law_bht_wanggonglingdiyihui: "Princely State Council"
 law_bht_wanggonglingdiyihui_desc: "Advisory or legislative bodies established within the princely states of British India to handle internal affairs, but their authority was strictly limited by the ruler and the overseeing British Resident."
 law_bht_yanshuifa: "Salt Tax"
 law_bht_yanshuifa_desc: "A monopolistic tax on the production and sale of salt enforced by the British colonial government as a major source of revenue. Mahatma Gandhi launched the Salt March in protest against this tax."
 law_bht_yuyanbanghuafen: "Linguistic Reorganization of States"
 law_bht_yuyanbanghuafen_desc: "The post-independence policy of redrawing state boundaries in India primarily on the basis of language, codified by the States Reorganization Act of 1956, to respect regional linguistic diversity."
 law_bht_zhongyanghoubeijingchabudui: "Central Reserve Police Force"
 law_bht_zhongyanghoubeijingchabudui_desc: "A Central Armed Police Force under India's Ministry of Home Affairs, tasked with assisting state governments in maintaining law and order and handling insurgencies, playing a vital role in internal security."
 law_bht_quanyinfuwu: "All India Services"
 law_bht_quanyinfuwu_desc: "The elite civil services retained after Indian independence, including the Indian Administrative Service and the Indian Police Service. These are centrally controlled to ensure administrative continuity and national unity."
 law_bol_junshishehuizhuyi: "Military Socialism"
 law_bol_junshishehuizhuyi_desc: "A set of policies promoted by left-leaning military regimes in Bolivia from the 1930s to the 1950s, emphasizing state intervention in the economy, land reform, and labor rights while using nationalism to mediate class conflict."
 law_bol_pulakayuexuanyan: "Thesis of Pulacayo"
 law_bol_pulakayuexuanyan_desc: "The foundational manifesto of the Nationalist Revolutionary Movement issued in 1952, advocating for land reform, nationalization of mines, and universal suffrage, becoming the core guiding principle of the Bolivian National Revolution that year."
 law_bos_aoxionggongguan: "Austro-Hungarian Condominium"
 law_bos_aoxionggongguan_desc: "The joint military occupation and administration of Bosnia and Herzegovina by Austria-Hungary from 1878 to 1918. Formally, it retained the nominal suzerainty of the Ottoman Empire, but was in fact controlled solely by Austria-Hungary."
 law_dfr_yingaigongguan: "Anglo-Egyptian Condominium"
 law_dfr_yingaigongguan_desc: "The joint administration of Sudan by Britain and Egypt from 1899 to 1956, formally ruled by a governor-general appointed by both powers, but actual power was held exclusively by Britain."
 law_cub_moleitefa: "Moret Law"
 law_cub_moleitefa_desc: "A law enacted by the Spanish Cortes on July 4, 1870, establishing gradual emancipation in its remaining colonies in response to independence movements and external abolitionist pressure."
 law_hai_tongdunmakute: "Tonton Macoute"
 law_hai_tongdunmakute_desc: "A Haitian paramilitary force that served as the instrument of terror for the Duvalier dictatorship. It forced obedience through brutal repression and murder, causing mass casualties and exiles."
 law_sia_taiguorenmaitaiguohuo: "Thai Buy Thai Movement"
 law_sia_taiguorenmaitaiguohuo_desc: "A nationalist economic campaign promoted by the government of Plaek Phibunsongkhram in the 1930s and 1940s, urging Thais to prioritize domestic products to reduce foreign economic penetration and strengthen national identity."
 law_sia_sakedina: "Sakdina"
 law_sia_sakedina_desc: "The traditional social hierarchy system of Thailand, which determined the social status and corvée obligations of nobles and commoners based on land or rice-field units, forming the core of the feudal order."
 law_sia_weiguozhuyi: "Ratthaniyom"
 law_sia_weiguozhuyi_desc: "The official ideology of the Plaek Phibunsongkhram regime, emphasizing the supremacy of the nation, ethnicity, Buddhism, and the monarchy, aimed at forging a modern, unified, and loyal national identity."
 law_swi_zhanshijingshenfangyu: "Spiritual Defence"
 law_swi_zhanshijingshenfangyu_desc: "Refers to the concept of 'Geistige Landesverteidigung' proposed by Switzerland during WWII and the Cold War, which sought to resist foreign ideological infiltration by strengthening national cultural identity and ideological construction, thereby safeguarding Swiss neutrality and unity."
 law_swi_lianbangzhijieshui: "Federal Direct Tax"
 law_swi_lianbangzhijieshui_desc: "Refers to the wartime profits tax introduced by the Swiss federal government in 1915, later evolving into federal income and property taxes, forming a federal-level tax system established to cover war expenditures."
 law_mon_niegeshiwangchao: "Njegoš Dynasty"
 law_mon_niegeshiwangchao_desc: "Also known as the Petrović-Njegoš Dynasty, a theocratic and monarchical dynasty that ruled Montenegro from 1697 to 1918, becoming a secular principality in 1852 and a kingdom in 1910."
 law_net_lunlizhengce: "Ethical Policy"
 law_net_lunlizhengce_desc: "A colonial policy implemented by the Netherlands in the Dutch East Indies in the early 20th century, advocating reforms in education, irrigation, and migration to improve native welfare as a means of maintaining control, though its actual effects were limited."
 law_chl_yongjiubaoweiminzhufa: "Law for the Permanent Defence of Democracy"
 law_chl_yongjiubaoweiminzhufa_desc: "An anti-communist law enacted by the Chilean government in 1948, declaring the Communist Party illegal and prohibiting its activities, known as the 'Cursed Law'."
 law_cry_zaweiyewangluo: "Zawiya Network"
 law_cry_zaweiyewangluo_desc: "A post-war Libyan alliance of militia groups and smuggling networks controlling oil facilities and the coastline in the Zawiya region, designated by the UN as a criminal organisation engaged in human and fuel smuggling."
 law_den_gelunweitezhuyi: "Grundtvigianism"
 law_den_gelunweitezhuyi_desc: "A national enlightenment philosophy advocated by the 19th-century Danish thinker N.F.S. Grundtvig, promoting the awakening of the people's spirit through the establishment of folk high schools, which laid the foundation for modern Danish education."
 law_den_shaerbaojuntuan: "Schalburg Corps"
 law_den_shaerbaojuntuan_desc: "A Nazi German-established paramilitary collaboration unit in Denmark during WWII, affiliated with the Germanic SS, primarily tasked with suppressing the Danish resistance movement."
 law_clm_laodongshitifadian: "Substantive Labour Code"
 law_clm_laodongshitifadian_desc: "Colombia's fundamental labour code enacted in 1950, systematically regulating employment relations, working conditions, and the rights and obligations of both labour and capital."
 law_cos_jiefangzhuyi: "Liberationism"
 law_cos_jiefangzhuyi_desc: "The core ideology of Costa Rica's National Liberation Party, advocating state intervention, import-substitution industrialisation, and nationalisation policies to achieve economic development and social justice."
 law_cos_kalianzhuyi: "Figuerismo"
 law_cos_kalianzhuyi_desc: "A political philosophy named after José Figueres Ferrer, founder of Costa Rica's National Liberation Party, advocating social democracy, state economic intervention, abolition of the military, and nationalisation to drive national modernisation, emphasising social justice and democratic institutions."
 law_brz_weiguanpai: "Lieutenants' Movement"
 law_brz_weiguanpai_desc: "An organisation of middle- and lower-ranking officers in Brazil in the 1920s–1930s that opposed the rule of agrarian oligarchies, representing middle-class interests and serving as a key driving force behind the 1930 Revolution."
 law_brz_shangxiaozhuyi: "Coronelismo"
 law_brz_shangxiaozhuyi_desc: "A system of local political patronage in Brazil's Old Republic, whereby large landowning colonels (coronéis) controlled votes and people to manipulate local politics, forming an oligarchic rule."
 law_brz_niunaijiakafei: "Coffee with Milk"
 law_brz_niunaijiakafei_desc: "The political alliance in Brazil's Old Republic between the coffee-growing oligarchs of São Paulo state and the dairy-producing oligarchs of Minas Gerais state, who alternated in power at the federal level to consolidate agrarian oligarchic control."
 law_brz_huangjinfa: "Golden Law"
 law_brz_huangjinfa_desc: "The abolitionist decree signed in 1888 by Brazilian Regent Princess Isabel, which completely abolished slavery in Brazil, making Brazil the last country in the Americas to end slavery."
 law_brz_zhengzhiyushehuizhixubu: "Department of Political and Social Order"
 law_brz_zhengzhiyushehuizhixubu_desc: "A political police force established in Brazil during the Vargas era and the military dictatorship, tasked with suppressing political dissent deemed subversive to the social order."
 law_can_yingshubeimeifaan: "British North America Act"
 law_can_yingshubeimeifaan_desc: "A constitutional act passed by the British Parliament in 1867, uniting three Canadian provinces into a federal Dominion, laying the foundation for Canada's political system."
 law_can_zhanshicuoshifa: "War Measures Act"
 law_can_zhanshicuoshifa_desc: "An emergency powers act passed by the Canadian Parliament in 1914, granting the government broad authority to take extraordinary measures, including arrests and censorship, during war or insurrection."
 law_can_chanyezhengduandiaochafa: "Industrial Disputes Investigation Act"
 law_can_chanyezhengduandiaochafa_desc: "A Canadian labour law enacted in 1907, handling labour disputes through compulsory conciliation and investigation procedures to maintain industrial peace."
 law_can_zizhilingtudifa: "Dominion Lands Act"
 law_can_zizhilingtudifa_desc: "A Canadian federal law of 1872 that encouraged development of the western prairies by granting free land to settlers, driving immigration and railway construction in Western Canada."
 law_can_lianxuhangxing: "Continuous Journey Law"
 law_can_lianxuhangxing_desc: "Refers to a Canadian immigration restriction law passed in 1908, requiring immigrants to travel directly from their country of nationality on a continuous passage without stops."
 law_kor_huangtongzhi: "Royal Succession System"
 law_kor_huangtongzhi_desc: "The ruling order centred on royal bloodline during the Joseon Dynasty, emphasising hereditary succession and absolute monarchical authority, establishing the orthodox foundation of Joseon feudal rule."
 law_kor_yibingdui: "Righteous Army"
 law_kor_yibingdui_desc: "Popularly-organised anti-Japanese armed forces in Korean history, active mainly during the Japanese colonial period, serving as an important symbol of Korean resistance against Japanese rule."
 law_kor_gongnongchiweidui: "Worker-Peasant Red Guard"
 law_kor_gongnongchiweidui_desc: "A paramilitary militia organisation in North Korea, established in 1959, composed of workers and peasants, undertaking civil defence duties."
 law_kor_zhutisixiang: "Juche Idea"
 law_kor_zhutisixiang_desc: "The official ideology founded by Kim Il-sung and established as the guiding ideology of the Workers' Party of Korea, emphasising political autonomy, economic self-reliance, and national self-defence."
 law_kor_ketianfa: "Land Classification Law"
 law_kor_ketianfa_desc: "A land system decree promulgated by Yi Seong-gye in 1391, granting land according to official rank in the Gyeonggi region, laying the economic foundation of the early Joseon Dynasty."
 law_kor_liangbanyinxuzhi: "Yangban Patronage Appointment System"
 law_kor_liangbanyinxuzhi_desc: "A system in the Joseon Dynasty whereby yangban youths directly entered officialdom based on their fathers' merits, operating alongside the civil service examination system as an important mechanism for preserving aristocratic privilege."
 law_kor_yijinfu: "Office of the Royal Investigatory Court"
 law_kor_yijinfu_desc: "The highest judicial body during the Joseon Dynasty, under the Ministry of War, specialised in trying grave cases such as treason and sedition that threatened the state's foundation, combining functions of a court, prosecution, and prison."
 law_kor_sanbaxian: "38th Parallel"
 law_kor_sanbaxian_desc: "The 38th parallel north on the Korean Peninsula, which became the US-Soviet surrender demarcation line after WWII and later evolved into the temporary military demarcation line between North and South Korea."
 law_por_bulagansawangchao: "House of Braganza"
 law_por_bulagansawangchao_desc: "The dynasty of Portugal and Brazil, which replaced the House of Habsburg in Portugal in 1640 and ruled until the establishment of the Republic in 1910; also ruled the Empire of Brazil."
 law_por_guojijingchayuguofangjingcha: "International and State Defence Police"
 law_por_guojijingchayuguofangjingcha_desc: "The political police force during the Salazar dictatorship in Portugal, responsible for suppressing opposition, censoring public opinion, and maintaining regime stability."
 law_lux_dagongshixi: "Hereditary Grand Ducal Succession"
 law_lux_dagongshixi_desc: "The succession system of the Grand Duchy of Luxembourg, vested hereditarily in the House of Nassau-Weilburg and following primogeniture."
 law_lux_dagongjinjichiling: "Grand Ducal Emergency Decree"
 law_lux_dagongjinjichiling_desc: "A legally binding decree issued by the Grand Duke of Luxembourg under a state of emergency, subject to subsequent parliamentary ratification."
 law_lux_dagongmishuchu: "Grand Ducal Secretariat"
 law_lux_dagongmishuchu_desc: "The administrative auxiliary body of the Grand Duke of Luxembourg, responsible for handling the Grand Duke's daily affairs, official documents, and ceremonial arrangements."
 law_buk_amulakedaer: "Amilakdar"
 law_buk_amulakedaer_desc: "A local tax official in the Emirate of Bukhara, responsible for collecting levies within his jurisdiction and gathering local social and economic intelligence."
 law_khi_mazajihui: "Mazar Assembly"
 law_khi_mazajihui_desc: "Religious and social gatherings held by the populace around the tombs of Islamic saints in the Khanate of Khiva, serving both the commemoration of holy figures and community fellowship."
 law_gre_aifuzuoni: "Evzones"
 law_gre_aifuzuoni_desc: "The traditional uniformed soldiers of the Greek Presidential Guard; also a term for light infantry units in the 19th-20th century Greek army, renowned for their folk costume and martial valour."
 law_gre_minzhujun: "Democratic Army"
 law_gre_minzhujun_desc: "The armed forces led by the Greek Communist Party during the Greek Civil War, which fought against the national army and was ultimately defeated."
 law_gre_demodiketixi: "Demotic Greek system"
 law_gre_demodiketixi_desc: "The language system advocated by the Greek language movement that promoted the vernacular as the basis for modern Greek, in contrast to Katharevousa, and which became the standard for Modern Greek."
 law_gbr_hanovermonarchy: "House of Hanover"
 law_gbr_hanovermonarchy_desc: "The reigning royal dynasty of the United Kingdom, founded in Wurttemburg continuing to the present day, including William of Hanover and Victoria of Hanover soon Queen Victoria of Great Britian and Ireland."
 law_gbr_guofangtiaoli: "Defence Regulations"
 law_gbr_guofangtiaoli_desc: "Wartime or emergency regulations enacted under the United Kingdom's Defence of the Realm Act, authorising the government to take special measures such as internment, censorship, and requisition."
 law_gbr_renminyusuan: "People's Budget"
 law_gbr_renminyusuan_desc: "The budget proposed by Chancellor of the Exchequer David Lloyd George in 1909, which advocated increased taxes on the wealthy to fund social welfare and naval expenditure, leading to its rejection by the House of Lords and a constitutional crisis."
 law_gbr_batelejiaoyufa: "Butler Education Act"
 law_gbr_batelejiaoyufa_desc: "The Education Act of 1944 in the United Kingdom, which established free secondary education and divided secondary schools into grammar, technical, and modern types."
 law_gbr_profitfirst_philosophy: "Profit First Philosphy" 
 law_gbr_profitfirst_philosophy_desc: "The British goverment has taken an hands off aproach when it comes to capital investment"
 law_gbr_nhs: "National Health Service"
 law_gbr_nhs_desc: "The universal, tax-funded healthcare system established in the United Kingdom in 1948, providing services based on need and constituting a core component of the welfare state."
 law_gbr_dandufunv: "Feme Sole"
 law_gbr_dandufunv_desc: "A term in English law referring to an unmarried woman or widow who possessed independent legal status, in contrast to a married woman."
 law_gbr_pingdengxuanjuquanfa: "Equal Franchise Act"
 law_gbr_pingdengxuanjuquanfa_desc: "The Representation of the People Act of 1928 in the United Kingdom, which granted equal voting rights to men and women aged 21 and over, achieving universal suffrage."
 law_gbr_dadouhuijingcha: "Metropolitan Police"
 law_gbr_dadouhuijingcha_desc: "The modern professional police force established in London in 1829 by Robert Peel, with its headquarters at Scotland Yard."
 law_gbr_sugelanchang: "Scotland Yard"
 law_gbr_sugelanchang_desc: "The colloquial name for the headquarters of the London Metropolitan Police, also used as a metonym for the Criminal Investigation Department of the United Kingdom."
 law_gbr_nuosiketeteliweilianzhidu: "Northcote-Trevelyan System"
 law_gbr_nuosiketeteliweilianzhidu_desc: "The civil service selection system established in the United Kingdom in 1854, which replaced patronage with open competitive examinations, laying the foundation for the modern civil service."
 law_gbr_junqingliuchu: "MI6"
 law_gbr_junqingliuchu_desc: "The Secret Intelligence Service of the United Kingdom, responsible for overseas intelligence gathering and covert operations."
 law_gbr_junqingwuchu: "MI5"
 law_gbr_junqingwuchu_desc: "The Security Service of the United Kingdom, responsible for domestic security, counter-espionage, and counter-terrorism."
 law_gbr_copyholder: "Partial Copyholder/Inclosure"
 law_gbr_copyholder_desc: "A series of acts have already passed by the British Parliament to convert old common peseant land laws in England from the late medieval period."
 law_gbr_inclosure_act: "Inclosure Acts"
 law_gbr_inclosure_act_desc: "Full Transformation of a series of acts passed by the British Parliament from the 18th to 19th centuries, authorising the conversion of open fields and common land into enclosed private farms, thereby driving the agricultural revolution and urbanisation."
 law_gbr_cashnexus: "Cash Nexus"
  law_gbr_cashnexus_desc: "Cash Nexus Emphasizie a focus on profit and individual self-interest at the expense of moral and social values."
 law_fra_minzugeming: "National Revolution"
 law_fra_minzugeming_desc: "The official ideology of the Vichy regime in France during World War II, led by Marshal Philippe Pétain, aimed at establishing an authoritarian, xenophobic new order."
 law_fra_waijijuntuan: "French Foreign Legion"
 law_fra_waijijuntuan_desc: "A regular unit of the French Army composed of foreign nationals, founded in 1831, with the motto 'Legio Patria Nostra', renowned as an elite force in French overseas operations and history."
 law_fra_tuzhufadian: "Native Code"
 law_fra_tuzhufadian_desc: "The discriminatory legal system specifically targeting native inhabitants in French colonies, placing them in a legally inferior status."
 law_fra_guojiajihuizongdu: "General Planning Commissariat"
 law_fra_guojiajihuizongdu_desc: "The economic planning agency established in post-WWII France, responsible for formulating and implementing medium- and long-term national economic plans to drive national modernization."
 law_fra_feilifaan: "Ferry Laws"
 law_fra_feilifaan_desc: "A series of education laws enacted in France in 1881-1882, establishing the three principles of 'compulsory, free, and secular' education, laying the foundation for the modern French education system."
 law_eth_kageniu: "Kagnew"
 law_eth_kageniu_desc: "Initially referred to the elite Imperial Ethiopian force sent by Emperor Haile Selassie I to fight in the Korean War; later also denoted an important US communications base in Ethiopia during the Cold War."
 law_eth_gaibaerzhi: "Gabbar"
 law_eth_gaibaerzhi_desc: "A system of tribute-paying peasantry in Ethiopian history, referring to a class of tenant farmers tied to the land and obliged to pay tribute to lords or the state."
 law_eth_nafutengyajiabaer: "Naftanya–Gabbar"
 law_eth_nafutengyajiabaer_desc: "A land and labour system implemented in southern Ethiopia from the late 19th century, in which the 'Naftanya' were northern conquerors and the 'Gabbar' were southern peasants who provided labour and tribute to them."
 law_hun_shengsidifenwangguan: "Holy Crown of Saint Stephen"
 law_hun_shengsidifenwangguan_desc: "The crown of the King of Hungary, regarded as a symbol of Hungarian sovereignty and national independence; every king had to be crowned with this crown."
 law_hun_wangjiaxiongyalidifangfangweijun: "Royal Hungarian Honvéd"
 law_hun_wangjiaxiongyalidifangfangweijun_desc: "The territorial defence force of the Kingdom of Hungary during the Austro-Hungarian Empire, responsible for the defence of Transleithania and a significant component of the Imperial and Royal Army."
 law_hun_jianshiziminbing: "Arrow Cross Militia"
 law_hun_jianshiziminbing_desc: "The paramilitary organization of the Hungarian Arrow Cross Party, the most extreme fascist movement in Hungary during World War II, which seized power in 1944 and perpetrated brutal persecution and repression against Jews and Soviet forces."
 law_hun_mazhaerhua: "Magyarization"
 law_hun_mazhaerhua_desc: "The assimilation policy imposed by the Kingdom of Hungary during the Austro-Hungarian Empire, forcing other ethnic groups within its borders to adopt the Magyar language and culture."
 law_ecu_beilasikezhuyi: "Velasquismo"
 law_ecu_beilasikezhuyi_desc: "The populist political doctrine of Ecuadorian politician José María Velasco Ibarra, mobilizing the masses through charismatic leadership and nationalism, which dominated the country's politics from the 1930s to the 1970s."
 law_hon_kaliyatuo: "Cariato"
 law_hon_kaliyatuo_desc: "A power regime in Honduran political history, referring to the long-term dictatorial rule established by General Tiburcio Carías Andino during the first half of the 20th century."
 law_hon_sanshitiaosuqiu: "Thirty Demands"
 law_hon_sanshitiaosuqiu_desc: "A programmatic document issued during the 1954 Honduran banana workers' general strike, covering job security, sanitary conditions, and labour rights; a landmark event in Latin American labour history."
 law_jab_xiladewangchao: "Rashidi Dynasty"
 law_jab_xiladewangchao_desc: "A dynasty that ruled the Shammar Mountain region of the Arabian Peninsula from 1836 to 1921, which long competed with the House of Saud for control of Nejd."
 law_mor_alaweiwangchao: "Alaouite Dynasty"
 law_mor_alaweiwangchao_desc: "The dynasty that has ruled Morocco since 1666, basing its legitimacy on descent from the Prophet Muhammad, and continuing to the present day; one of the oldest reigning dynasties in the Arab world."
 law_mor_malijipai: "Maliki School"
 law_mor_malijipai_desc: "One of the four major schools of Sunni Islamic jurisprudence, relying on the Quran, Hadith, and the practice of Medina as sources of law; prevalent in North African countries such as Morocco and Algeria."
 law_dom_teluxiluejiazu: "Trujillo Regime"
 law_dom_teluxiluejiazu_desc: "The military dictatorship established by Rafael Trujillo in the Dominican Republic from 1930 to 1961, which controlled the country through terror and was overthrown by assassination."
 law_saf_bantujiaoyufa: "Bantu Education Act"
 law_saf_bantujiaoyufa_desc: "A law enacted by the apartheid government of South Africa in 1953, establishing a separate and inferior education system for Black Africans, designed to confine them to low-skilled labour; one of the cornerstone laws of apartheid."
 law_wad_kelakezhi: "Kolak System"
 law_wad_kelakezhi_desc: "A traditional land tenure system in southern Chad, in which tribal chiefs held the power to allocate land, and villagers exchanged labour and kind for usufruct rights; forming the socio-economic foundation of the pre-colonial period."
 law_lib_dianzhizhi: "Pledge System"
 law_lib_dianzhizhi_desc: "A traditional land tenure system in Liberia, in which peasants pledged their land use rights as collateral for debt to creditors; land could only be reclaimed after repaying the debt, often leading to permanent land loss."
 law_nej_wahabipai: "Wahhabi Movement"
 law_nej_wahabipai_desc: "An ultra-conservative Sunni Islamic movement that emerged in the Arabian Peninsula in the 18th century, advocating strict monotheism and a return to the original scriptures; it is the state religion and ruling foundation of the Kingdom of Saudi Arabia."
 law_nej_yihewanyundong: "Ikhwan Movement"
 law_nej_yihewanyundong_desc: "A religio-military movement founded by Ibn Saud in the early 20th century, which settled Bedouin nomads in agricultural colonies as a military-farming system; it provided the core military force for the unification of Saudi Arabia."
 law_rus_lieningzhuyi: "Leninism"
 law_rus_lieningzhuyi_desc: "Leninism is the Soviet theory of a council republic, emphasizing the leadership of the vanguard proletarian party, democratic centralism, and the establishment of the dictatorship of the proletariat through revolution."
 law_rus_zongwenxuechubanshiwuju: "Main Administration for Literary and Publishing Affairs"
 law_rus_zongwenxuechubanshiwuju_desc: "The Soviet censorship agency responsible for controlling the publication, distribution, and destruction of all printed matter, ensuring content conformed to state ideology."
 law_rus_shejijun: "Streltsy"
 law_rus_shejijun_desc: "The national militia force of Tsarist Russia, consisting of infantry armed with firearms, responsible for guarding the capital and field operations from the 16th to early 18th centuries."
 law_rus_gongnonghongjun: "Workers' and Peasants' Red Army"
 law_rus_gongnonghongjun_desc: "The professional military force of the Soviet Union, founded by Leon Trotsky in 1918, which defended the Soviet regime during the Civil War and World War II, later evolving into the Soviet Armed Forces."
 law_rus_buershiweikedang: "Bolshevik Party"
 law_rus_buershiweikedang_desc: "The core ruling party of the Soviet one-party system, formally established in 1912, which became the sole governing party of the Soviet Union after the October Revolution of 1917."
 law_rus_guojiajihuaweiyuanhui: "Gosplan"
 law_rus_guojiajihuaweiyuanhui_desc: "The central organ of the Soviet command economy, responsible for formulating and overseeing five-year plans and annual economic targets, directing national production and distribution."
 law_rus_qika: "Cheka"
 law_rus_qika_desc: "The early Soviet secret police organization, responsible for suppressing counter-revolution, espionage, and sabotage."
 law_rus_jitinongzhuang: "Kolkhoz"
 law_rus_jitinongzhuang_desc: "The collective agricultural organization in the Soviet Union, where peasants jointly cultivated land and delivered mandatory grain quotas to the state; the core of Stalin's agricultural collectivization."
 law_rus_gulage: "Gulag"
 law_rus_gulage_desc: "The Soviet forced labour camp system, a legacy of slavery-like conditions, which imprisoned political and criminal offenders, using forced labour for punishment and resource extraction."
 law_rus_xinjingjizhengce: "New Economic Policy"
 law_rus_xinjingjizhengce_desc: "The Soviet economic intervention policy implemented from 1921 to 1928, allowing limited private trade and small enterprises to restore the economy after the Civil War."
 law_rus_luomannuofuwangchao: "Romanov Dynasty"
 law_rus_luomannuofuwangchao_desc: "The monarchical dynasty of Tsarist Russia, which ruled from 1613 to 1917; all rulers from Peter I to Nicholas II belonged to this family."
 law_rus_guojiaduma: "State Duma"
 law_rus_guojiaduma_desc: "The legislative advisory assembly of Tsarist Russia, established in 1906 as a quasi-parliamentary body, sharing power with the Emperor and the State Council."
 law_rus_tongyilaodongxuexiao: "Unified Labour School"
 law_rus_tongyilaodongxuexiao_desc: "The Soviet public school system established in 1918, which abolished old estate-based schools and provided free, universal, and labour-oriented polytechnical education."
 law_rus_renminweiyuanhui: "Sovnarkom"
 law_rus_renminweiyuanhui_desc: "The Soviet government cabinet based on appointed bureaucracy, serving as the highest executive authority from 1917 to 1946."
 law_rus_guanjiebiao: "Table of Ranks"
 law_rus_guanjiebiao_desc: "The Tsarist bureaucratic hierarchy established by Peter the Great in 1722, dividing civil and military officials into 14 grades, with promotion based on merit rather than birth."
 law_rus_disanbu: "Third Department"
 law_rus_disanbu_desc: "The secret police of Tsarist Russia, established by Nicholas I in 1826, responsible for political surveillance, censorship, and suppression of revolutionary activities."
 law_rus_situoleipingshi: "Stolypin Land Reform"
 law_rus_situoleipingshi_desc: "The land reform model for tenant peasants in Tsarist Russia, promoted by Prime Minister Pyotr Stolypin, which allowed peasants to leave the commune and become independent smallholders, aiming to create a class of prosperous peasants known as kulaks."
 law_rus_shuiyizhi: "Tyaglo System"
 law_rus_shuiyizhi_desc: "The Tsarist poll-tax system, which taxed male serfs as the unit of assessment while also requiring labour services; the core burden of the serf-based economy."
 law_spa_tujijingwei: "Assault Guard"
 law_spa_tujijingwei_desc: "The Assault Guard was a paramilitary police force created by the Second Spanish Republic in 1931, wearing blue uniforms and specifically tasked with handling urban violence and political unrest."
 law_spa_weisiguanshui: "Wais Tariff"
 law_spa_weisiguanshui_desc: "The Wais Tariff was a protectionist customs act approved by Spain in July 1930, enacted as a retaliatory measure against French discriminatory trade policies and the American Smoot-Hawley Tariff Act."
 law_spa_hepinglunti: "Turno Pacífico"
 law_spa_hepinglunti_desc: "The Turno Pacífico was the political mechanism of alternating power between the Conservative and Liberal parties under monarchical supervision during the Bourbon Restoration, maintaining a superficially stable two-party system through electoral fraud."
 law_spa_chuizhigonghui: "Vertical Syndicate"
 law_spa_chuizhigonghui_desc: "The Vertical Syndicate was the sole legal trade union organization in Spain during the Franco regime, operating on a compulsory membership basis and incorporating both employers and workers under government control for the implementation of social policies."
 law_idn_banchaxila: "Pancasila"
 law_idn_banchaxila_desc: "The Five Principles of the Indonesian state, proposed by first President Sukarno on 1 June 1945, encompassing belief in God, humanitarianism, national unity, democracy, and social justice; serving as the nation's philosophical and ideological foundation."
 law_idn_nashagong: "Nasakom"
 law_idn_nashagong_desc: "The political doctrine advocated during Sukarno's presidency, an acronym combining nationalism, religion, and communism, aimed at achieving unity and cooperation among the three streams and thereby co-opting the Communist Party of Indonesia."
 law_idn_youlingdaominzhu: "Demokrasi Terpimpin"
 law_idn_youlingdaominzhu_desc: "The political system implemented in Indonesia from 1959 to 1966, dominated by President Sukarno, designed to achieve political stability through presidential centralism and replace parliamentary democracy, which he deemed ineffective."
 law_idn_baoleijihua: "Benteng Program"
 law_idn_baoleijihua_desc: "Indonesia's first affirmative economic policy implemented in the 1950s, aimed at fostering indigenous entrepreneurship by providing import licenses and credit to native Indonesian businessmen."
 law_idn_qiangzhizhongzhizhidu: "Cultivation System"
 law_idn_qiangzhizhongzhizhidu_desc: "A policy imposed by the Dutch colonial government in Java in the mid-19th century, compelling peasants to allocate a portion of their farmland to grow cash crops for the European market, such as sugar and coffee, in lieu of tax payment."
 law_idn_yexuexiao: "Wilde Scholen"
 law_idn_yexuexiao_desc: "A pejorative term used by the Dutch colonial authorities for private schools not certified by the government, referring to educational institutions operating outside the official system, often regarded as hotbeds of nationalist ideas."
 law_idn_xueshengyuan: "Taman Siswa"
 law_idn_xueshengyuan_desc: "A nationalist educational movement founded in 1922 by Ki Hajar Dewantara, Sukarno's mentor, in Yogyakarta, aimed at fostering national consciousness and cultural identity through a system distinct from Western colonial education."
 law_idn_jidonglvtuan: "Mobile Brigade Corps"
 law_idn_jidonglvtuan_desc: "A paramilitary special operations unit within the Indonesian National Police, responsible for high-risk operations including counter-terrorism, riot control, and suppressing separatism."
 law_idn_waidongfangren: "Vreemde Oosterlingen"
 law_idn_waidongfangren_desc: "The third legal class in the colonial society of the Dutch East Indies, referring to immigrant communities from China, Arabia, India, and other Eastern regions, whose legal status stood between Europeans and natives."
 law_idn_yejieshe: "Wilde Vereenigingen"
 law_idn_yejieshe_desc: "Civil associations or societies formed without the approval of the colonial government in the Dutch East Indies, which the authorities often used as grounds for surveillance or suppression."
 law_tur_sanpaxiatizhi: "Three Pashas Regime"
 law_tur_sanpaxiatizhi_desc: "The triumvirate dictatorship of three Young Turk leaders—Enver, Talaat, and Cemal Pashas—who effectively ruled the Ottoman Empire during the First World War."
 law_tur_miletezhi: "Millet System"
 law_tur_miletezhi_desc: "The autonomous system applied to non-Muslim religious communities in the Ottoman Empire, allowing their religious leaders a degree of autonomy in internal justice, education, and taxation, based on the principle of rule according to custom."
 law_tur_axiershui: "Aşar Tax"
 law_tur_axiershui_desc: "The traditional tithe levied on Muslim peasants in the Ottoman Empire, one of the empire's primary sources of revenue, which was abolished in 1925 by the newly established Republic of Turkey."
 law_tur_tongyijiaoyufa: "Law on Unification of Education"
 law_tur_tongyijiaoyufa_desc: "The secularizing education reform law enacted by the Republic of Turkey in 1924, aimed at bringing all educational institutions under the jurisdiction of the national Ministry of Education, closing traditional religious schools, and establishing a unified modern education system."
 law_tur_axilike: "Akhilik"
 law_tur_axilike_desc: "An Islamic guild system and fraternal organization originating in 13th-century Anatolia, combining commerce and crafts with Sufi moral codes, which deeply influenced the urban economy and social life of the Ottoman Empire."
 law_tur_ayangzhi: "Ayan System"
 law_tur_ayangzhi_desc: "The informal power structure in the Ottoman Empire during the 18th and early 19th centuries, whereby local notables and powerful families gradually gained control over regional political and economic affairs, becoming de facto rulers as central authority declined."
 law_per_kazhaerwangchao: "Qajar Dynasty"
 law_per_kazhaerwangchao_desc: "The Qajar Dynasty was a Turkic dynasty in Iranian history, ruling Iran from 1789 to 1925, establishing Tehran as its capital, and declining due to internal corruption and external pressure."
 law_per_balieweiwangchao: "Pahlavi Dynasty"
 law_per_balieweiwangchao_desc: "The Pahlavi Dynasty was the last monarchical dynasty of Iran, founded by Reza Shah in 1925, which pursued comprehensive Westernizing reforms and was overthrown in the 1979 Islamic Revolution."
 law_per_shieryimamupai: "Twelver Shi'ism"
 law_per_shieryimamupai_desc: "Twelver Shi'ism is the mainstream branch of Shia Islam, venerating Ali and his twelve descendants as Imams, believing the twelfth Imam is in occultation, and serving as the state religion of Iran."
 law_per_zhaimiansafa: "Law of Unveiling"
 law_per_zhaimiansafa_desc: "The Law of Unveiling was a modernizing decree issued by Reza Shah of the Pahlavi Dynasty in 1936, mandating women to remove the veil and forbidding traditional head coverings to promote secularization."
 law_per_sawake: "SAVAK"
 law_per_sawake_desc: "SAVAK was the secret police and intelligence agency of the Pahlavi Dynasty, the full name being the National Intelligence and Security Organization of Iran, notorious for suppressing political opposition and maintaining dictatorial rule."
 law_ser_kalaqiaoerjieweiqiwangzheng: "Karađorđević Monarchy"
 law_ser_kalaqiaoerjieweiqiwangzheng_desc: "The Karađorđević dynasty was the ruling family of Serbia and later the Kingdom of Yugoslavia, governing from the 1903 coup d'état until the abolition of the monarchy in 1945."
 law_ser_nishixuanyan: "Niš Declaration"
 law_ser_nishixuanyan_desc: "The Niš Declaration was a wartime program issued by the Serbian government in December 1914, proclaiming the liberation and unification of all South Slavs after the war, laying the blueprint for the subsequent Kingdom of Yugoslavia."
 law_ser_tongyihuosiwang: "Unification or Death"
 law_ser_tongyihuosiwang_desc: "Unification or Death was the motto of the Serbian secret society the Black Hand, which sought to achieve Greater Serbia through terrorist means, indirectly triggering the First World War."
 law_rom_minzujuntuanguo: "National Legionary State"
 law_rom_minzujuntuanguo_desc: "The National Legionary State was a totalitarian regime established in Romania from 1940 to 1941, a corporatist state under the co-rule of the Iron Guard and Ion Antonescu, implementing a fascist system."
 law_rom_guojialingxiu: "Conducător"
 law_rom_guojialingxiu_desc: "Conducător was the title of the supreme leader during Romania's fascist regime, meaning 'Leader', held by Ion Antonescu from 1940 to 1944 with dictatorial powers."
 law_rom_guojiafuxingzhenxian: "National Renaissance Front"
 law_rom_guojiafuxingzhenxian_desc: "The National Renaissance Front was a single-party organization established by King Carol II of Romania from 1938 to 1940, intended to replace parliamentary democracy with royal dictatorship."
 law_rom_saikulitate: "Securitate"
 law_rom_saikulitate_desc: "The Securitate was the secret police of the Socialist Republic of Romania, the full name being the Department of State Security, known for its extensive surveillance and repression to maintain regime stability."
 law_nor_kasitebogeertongfa: "Castbergian Child Laws"
 law_nor_kasitebogeertongfa_desc: "A landmark law of 1915 named after Norwegian politician Johan Castberg, which granted children born out of wedlock equal rights of inheritance and to bear their father's surname, and ensured financial support for single mothers."
 law_nor_neisaikong: "Nesekong"
 law_nor_neisaikong_desc: "A term for merchants who enjoyed trading privileges in northern Norway from the second half of the 18th century, deriving from the earlier Viking Age term for a local chieftain ruling over a peninsula."
 law_prg_mensu: "Mensú"
 law_prg_mensu_desc: "Indentured labourers who worked under near-slavery conditions on the jungle yerba mate plantations of Paraguay from the late 19th to mid-20th centuries, possessing no labour rights."
 law_prg_maojiao: "Pyrague"
 law_prg_maojiao_desc: "The secret police or espionage network established by rulers in Paraguayan history, used to monitor and suppress political opponents and maintain dictatorial rule."
 law_uru_bateliezhuyi: "Batllismo"
 law_uru_bateliezhuyi_desc: "The populist reform movement introduced by Uruguayan Colorado Party leader José Batlle y Ordóñez in the early 20th century, aimed at modernising the country through expanded political democracy and checks against presidential autocracy."
 law_uru_baleilagaige: "Varela Reform"
 law_uru_baleilagaige_desc: "The Uruguayan educational reform promoted by José Pedro Varela, marked by the 1877 Law of Common Education, which established a free, compulsory, and secular education system."
 law_uru_suomochajiazu: "Somoza Dynasty"
 law_uru_suomochajiazu_desc: "The political family that exercised dictatorial rule over Nicaragua from 1937 to 1979, repressing democratic forces domestically while aligning with the United States as a key Cold War ally."
 law_vnz_pengtuofeihuotizhi: "Pact of Punto Fijo"
 law_vnz_pengtuofeihuotizhi_desc: "The formal power-sharing agreement signed in 1958 between the Democratic Action and COPEI parties in Venezuela, which ensured political stability through alternating party rule amidst a wave of dictatorships in Latin America."
 law_vnz_gemeisizhuyi: "Gomecismo"
 law_vnz_gemeisizhuyi_desc: "The military dictatorship established by Juan Vicente Gómez in Venezuela from 1908 to 1935, sustained by oil revenues and inaugurating the era of the 'petro-dictatorship' in the country."
 law_nzl_huaitangyitiaoyue: "Treaty of Waitangi"
 law_nzl_huaitangyitiaoyue_desc: "The founding document of New Zealand signed in 1840 between the British Crown and Māori chiefs, which established British sovereignty while promising to protect Māori land and property rights, though its implementation has long been controversial due to divergent interpretations of its clauses."
 law_oma_zhengzhizhiren: "Ahl al-Ḥall wa'l-ʿAqd"
 law_oma_zhengzhizhiren_desc: "A concept in the Ibadhi tradition, the third major sect of Islam, specifically referring to those of upright character within the sect who could be elected by the community as the imam, the supreme leader."
 law_oma_falaji: "Falaj"
 law_oma_falaji_desc: "An ancient irrigation system in Oman dating back thousands of years, which uses gravity to channel water from underground sources or springs, inscribed on the UNESCO World Heritage List in 2006 for its unique value."
 law_phi_beiermaoyifaan: "Bell Trade Act"
 law_phi_beiermaoyifaan_desc: "An act passed by the United States Congress in 1946 which, as a condition for post-war reconstruction aid, mandated equal rights for U.S. citizens in the Philippines in trade, currency, and immigration, serving as a tool for perpetuating American colonial influence."
 law_phi_tuomasiren: "Thomasites"
 law_phi_tuomasiren_desc: "Approximately 600 American teachers who arrived in the Philippines in 1901 aboard the U.S. Army Transport Thomas, dispatched by the U.S. government to establish a public school system with English as the medium of instruction."
 law_pnm_kelongziyouqu: "Colón Free Zone"
 law_pnm_kelongziyouqu_desc: "The largest free trade zone in the Western Hemisphere, established by the Panamanian government in 1948 at the Atlantic entrance to the Panama Canal, specialising in re-export trade and often called the 'Hong Kong of the Western Hemisphere'."
 law_pnm_jinmingceyuyinmingce: "Gold Roll and Silver Roll"
 law_pnm_jinmingceyuyinmingce_desc: "A racially segregated payroll system implemented during the construction and operation of the Panama Canal by the United States, in which American employees were placed on the high-paying 'Gold Roll', while Panamanian and other Latin American labourers were placed on the low-paying 'Silver Roll'."
 law_ita_safuyiwangchao: "House of Savoy"
 law_ita_safuyiwangchao_desc: "An ancient European royal house that unified Italy and established the Kingdom in 1861, ruling until the Republic was proclaimed in 1946; a symbol of Italian unification and monarchy."
 law_ita_xinwenshengchashu: "Press Office"
 law_ita_xinwenshengchashu_desc: "The agency under Mussolini that monitored and suppressed the media, aiming to eliminate anti-fascist言论 and maintain the fascist regime's information monopoly and propaganda control."
 law_ita_lingxiuzhi: "Duce system"
 law_ita_lingxiuzhi_desc: "Mussolini's dictatorial model of rule, centred on the 'Duce' as the holder of absolute power, overturning parliamentary democracy and establishing fascist one-party dictatorship."
 law_ita_qiaoliditixi: "Giolittian system"
 law_ita_qiaoliditixi_desc: "The governance model during Giovanni Giolitti's premiership, which used political bargaining and divide-and-rule tactics to co-opt various forces into the parliamentary system, thereby preserving the liberal order."
 law_ita_aerqiebofa: "Acerbo Law"
 law_ita_aerqiebofa_desc: "The electoral law of 1923 that granted any party receiving at least 25 percent of the vote two-thirds of the parliamentary seats, helping Mussolini consolidate one-party rule."
 law_ita_guojiafaxisidang: "National Fascist Party"
 law_ita_guojiafaxisidang_desc: "The fascist party founded and led by Mussolini in 1921, which banned all other political parties and became the sole totalitarian ruling force in Italy."
 law_ita_laodongxianzhang: "Labour Charter"
 law_ita_laodongxianzhang_desc: "The 1927 charter of corporatism promulgated by Mussolini, establishing state intervention in labour relations, abolishing the right to strike in the name of 'class collaboration', and tightening fascist control."
 law_ita_latelantiaoyue: "Lateran Treaty"
 law_ita_latelantiaoyue_desc: "The 1929 agreement between Italy and the Holy See, which secured Vatican sovereignty in exchange for papal support, resolving the 'Roman Question' that had persisted for nearly sixty years."
 law_ita_xiaomaizhanyi: "Battle for Wheat"
 law_ita_xiaomaizhanyi_desc: "The grain production campaign launched by Mussolini in 1925 to increase wheat self-sufficiency, reduce import dependence, and strengthen national agricultural autonomy."
 law_ita_fanfannijihua: "Fanfani Plan"
 law_ita_fanfannijihua_desc: "A ten-year economic development programme proposed by the Fanfani government in the 1950s, focusing on industrialising the southern region to narrow the north-south economic gap."
 law_ita_zhandilaigaige: "Gentile Reform"
 law_ita_zhandilaigaige_desc: "The 1923 education reform implemented by the philosopher Giovanni Gentile, which emphasised humanistic education and state authority, training an elite for the fascist regime."
 law_ita_aofula: "OVRA"
 law_ita_aofula_desc: "The secret political police established by Mussolini in 1926, responsible for monitoring, arresting, and suppressing all anti-fascist activities to maintain dictatorial rule."
 law_ita_fatuanhuiyi: "Corporative Assembly"
 law_ita_fatuanhuiyi_desc: "The highest decision-making body of Italian fascism, whose members were appointed by Mussolini; nominally coordinating the interests of various 'corporations', it was in reality a tool for consolidating the Duce's dictatorship."
 law_jap_tianhuangzhi: "Emperor system"
 law_jap_tianhuangzhi_desc: "The Japanese monarchical system with the Emperor as head of state; after World War II, the Emperor lost his divine status and became a national symbol."
 law_jap_bujingzui: "lese-majesty law"
 law_jap_bujingzui_desc: "An offense under the old Japanese Penal Code for disrespectful acts against the Emperor, imperial family, or imperial shrines; abolished in 1947."
 law_jap_guominyiyongdui: "National Volunteer Corps"
 law_jap_guominyiyongdui_desc: "A nationwide armed militia organized by Japan at the end of World War II for the decisive homeland battle, composed of males aged 15 to 60 and females aged 17 to 40."
 law_jap_zaixiangjunrenhui: "Reservist Association"
 law_jap_zaixiangjunrenhui_desc: "A veterans' organization under the jurisdiction of the Japanese Army Ministry, responsible for assisting conscription and inculcating militarist ideology; dissolved after Japan's defeat."
 law_jap_yiyiyusui: "One Hundred Million Die Together"
 law_jap_yiyiyusui_desc: "A Japanese militarist slogan at the end of World War II, calling on the entire nation to fight to the last person; collapsed with Japan's surrender."
 law_jap_ziweidui: "Japan Self-Defense Forces"
 law_jap_ziweidui_desc: "The national defence force of Japan established in 1954, nominally non-military but in fact the country's army, navy, and air force."
 law_jap_yuanlaozhengzhi: "Genrō politics"
 law_jap_yuanlaozhengzhi_desc: "The informal system under the Meiji Constitution in which elder statesmen (genrō) such as Itō Hirobumi chose prime ministers and decided national policies behind the scenes."
 law_jap_zhongchenhuiyi: "Jūshin Kaigi"
 law_jap_zhongchenhuiyi_desc: "The supreme advisory council composed of former prime ministers and the President of the Privy Council in Japan during World War II, which decided major national policies."
 law_jap_dazhengyizanhui: "Imperial Rule Assistance Association"
 law_jap_dazhengyizanhui_desc: "The core organization of the Imperial Rule Assistance system established by Konoe Fumimaro in 1940, replacing party politics with political centralisation."
 law_jap_laodongjizhunfa: "Labor Standards Law"
 law_jap_laodongjizhunfa_desc: "The basic labour law enacted by Japan in 1947, establishing standards for minimum wage, working hours, safety, and hygiene."
 law_jap_babaiwanshen: "Yaoyorozu no Kami"
 law_jap_babaiwanshen_desc: "The animistic belief in Shinto of 'eight million gods', signifying the presence of countless deities throughout heaven and earth."
 law_jap_huangminhua: "Kōminka"
 law_jap_huangminhua_desc: "The assimilation policy imposed by Japan during its colonial rule, forcing occupied populations to adopt Emperor worship, Japanese language education, and Japanese culture."
 law_jap_wupinshui: "Commodity Tax"
 law_jap_wupinshui_desc: "An indirect excise tax introduced in Japan in 1940, levied on specific consumer goods, replaced by the consumption tax in 1989."
 law_jap_dishuigaizheng: "Land Tax Reform"
 law_jap_dishuigaizheng_desc: "The land tax reform implemented by the Meiji government from 1873 to 1880, establishing land tax payment in money at a uniform rate of 3 percent of land value."
 law_jap_xuezhiling: "Gakusei"
 law_jap_xuezhiling_desc: "Japan's first modern education decree, promulgated in 1872, establishing a nationwide unified school district system and laying the foundation for modern education."
 law_jap_jishenghui: "Saiseikai"
 law_jap_jishenghui_desc: "A charitable organisation founded by private citizens during the Meiji period in Japan, later developing into a public benefit corporation engaged in medical care and relief work."
 law_jap_enjizhidu: "Onkyū system"
 law_jap_enjizhidu_desc: "The system of pensions or annuities paid to soldiers, officials, and their survivors in Japan, begun in the Meiji period and reformed after Japan's defeat."
 law_jap_gonggongnianjin: "Public Pension"
 law_jap_gonggongnianjin_desc: "The Japanese national pension system, comprising the National Pension, Employees' Pension Insurance, and Mutual Aid Association pensions, achieving universal coverage."
 law_jap_nvzitingshendui: "Women's Volunteer Corps"
 law_jap_nvzitingshendui_desc: "Female volunteer labour units organised by Japan at the end of World War II, primarily engaged in military logistics and factory production."
 law_jap_jingchabenbu: "Prefectural Police Headquarters"
 law_jap_jingchabenbu_desc: "The highest organ of the prefectural police organisation in Japan, equivalent to a provincial police headquarters, responsible for policing its jurisdiction."
 law_jap_jingshiting: "Metropolitan Police Department"
 law_jap_jingshiting_desc: "The police headquarters of Tokyo Metropolis, established in 1874, responsible for public security within Tokyo."
 law_jap_huazuling: "Kazoku Law"
 law_jap_huazuling_desc: "The 1884 law on the peerage system promulgated by the Meiji government, dividing court nobles and feudal lords into five ranks of titles; abolished in 1947."
 law_jap_tuowusheng: "Ministry of Colonial Affairs"
 law_jap_tuowusheng_desc: "The Japanese colonial administrative organ established in 1929, governing Korea, Taiwan, the Kwantung Leased Territory, and the South Seas Mandate; abolished in 1942."
 law_jap_jingchayubeidui: "National Police Reserve"
 law_jap_jingchayubeidui_desc: "The paramilitary force formed by Japan after the outbreak of the Korean War in 1950, later reorganised as the Ground Self-Defense Force."
 law_jap_tebiegaodengjingccha: "Special Higher Police"
 law_jap_tebiegaodengjingccha_desc: "The political police established in Japan in 1911, specially tasked with monitoring and suppressing socialists and anti-government thought; commonly known as the 'Tokkō Police'."
 law_jap_zhirenqinfang: "Shokunin Oyakata"
 law_jap_zhirenqinfang_desc: "The head of a craft guild in Edo-period Japan, responsible for managing craftsmen, contracting work, and controlling wages."
 law_jap_chanyebaoguohui: "Industrial Patriotic Association"
 law_jap_chanyebaoguohui_desc: "A labour-management integration organisation compulsorily established within Japanese enterprises in 1938, aimed at controlling workers and promoting military production."
 law_jap_jishengdizhuzhi: "Parasitic Landlord System"
 law_jap_jishengdizhuzhi_desc: "The modern Japanese land tenure system in which absentee landlords leased land to tenant farmers and collected high rents in kind."
 law_usa_gongpingshizheng: "Fair Deal"
 law_usa_gongpingshizheng_desc: "The domestic policy agenda proposed by U.S. President Harry S. Truman, continuing and expanding the New Deal, encompassing goals such as universal health care, civil rights legislation, and full employment."
 law_usa_shimisifa: "Smith Act"
 law_usa_shimisifa_desc: "A federal law passed by the United States in 1940, making it illegal to advocate the violent overthrow of the government; used to prosecute members of the Communist Party."
 law_usa_kangsituokefa: "Comstock Act"
 law_usa_kangsituokefa_desc: "A federal law passed by the United States in 1873, classifying contraceptive information and obscene materials as obscenity and prohibiting their distribution through the mail."
 law_usa_xuanzhengbingyifa: "Selective Service Act"
 law_usa_xuanzhengbingyifa_desc: "The conscription laws enacted by the United States in 1917 and 1940, authorizing the government to draft male citizens nationwide for service in the world wars."
 law_usa_renyiguyongyuanze: "Employment at Will"
 law_usa_renyiguyongyuanze_desc: "A common law doctrine in the United States, allowing either the employer or the employee to terminate the employment relationship at any time without cause, leaving workers with minimal legal protection."
 law_usa_wagenafaan: "Wagner Act"
 law_usa_wagenafaan_desc: "The National Labor Relations Act of 1935, guaranteeing workers the right to organize unions, bargain collectively, and strike; the cornerstone of the National Labor Relations Board."
 law_usa_jiefangnulixuanyan: "Emancipation Proclamation"
 law_usa_jiefangnulixuanyan_desc: "An executive order issued by U.S. President Abraham Lincoln in 1863, declaring all slaves in rebellious states to be free, a crucial step toward the abolition of slavery."
 law_usa_qiufanzulin: "Convict Leasing"
 law_usa_qiufanzulin_desc: "A debt peonage system in the American South after the Civil War, leasing prisoners to private enterprises to offset incarceration costs, effectively reducing convicts to forced labour."
 law_usa_angloconformity: "Anglo-Conformity"
 law_usa_angloconformity_desc: "A theory of American assimilation holding that immigrants must abandon their original cultures and fully adopt Anglo-Saxon language, values, and way of life."
 EFFECTS_ON_ACCEPTANCE_law_usa_angloconformity: "#tooltippable #tooltip:$BREAKDOWN_TAG$ Low Acceptance status Pops are punished, Pops in higher statuses more accepting of the government#!#!"
 law_usa_jimcrow: "Jim Crow Laws"
 law_usa_jimcrow:_desc: "Racial segregation laws enacted by Southern states in the United States from the late 19th to mid-20th centuries, mandating separate public facilities for different races."
 EFFECTS_ON_ACCEPTANCE_law_usa_jimcrow: "#tooltippable #tooltip:$BREAKDOWN_TAG$  Moderate consequences for Pops with low Acceptance values#!#!"
 law_usa_dawes_act: "Dawes Act"
 law_usa_dawes_act_desc: "The General Allotment Act of 1887, providing for the distribution of tribal lands to individual Native Americans, aimed at breaking up tribal structures and promoting assimilation."
 EFFECTS_ON_ACCEPTANCE_law_usa_dawes_act: "#tooltippable #tooltip:$BREAKDOWN_TAG$ Life for Pops with the lowest Acceptance status is not pleasant, but manageable#!#!"
 law_usa_paerwoersitaidefa: "Capper-Volstead Act"
 law_usa_paerwoersitaidefa_desc: "A federal law passed by the United States in 1922, exempting agricultural cooperatives from antitrust prosecution and establishing the legality of cooperative collective marketing and bargaining."
 law_usa_luosifuxinzheng: "New Deal"
 law_usa_luosifuxinzheng_desc: "A series of economic intervention policies implemented by President Franklin D. Roosevelt in response to the Great Depression, including financial reform, public employment, and social security."
 law_usa_sherman: "Sherman Act"
 law_usa_sherman_desc: "The first federal antitrust law passed by the United States in 1890, prohibiting monopolistic conduct and conspiracies in restraint of trade, laying the foundation for modern competition law."
 law_usa_morrilltariff: "The Morrill Tariff Act"
 law_usa_morrilltariff_desc: "A high protective tariff act enacted by the United States while primarily a protective tariff, it also led to tensions with foreign nations that responded with their own tariffs, creating a form of retaliatory cycle."
 law_usa_monroe: "Monroe Doctrine"
 law_usa_monroe_desc: "The foreign policy doctrine articulated by U.S. President James Monroe in 1823, opposing European intervention in the affairs of the Americas, later interpreted as asserting U.S. hegemony in the Western Hemisphere."
 law_usa_americansystem: "American System"
 law_usa_americansystem_desc: "The economic plan proposed by American statesman Henry Clay in the 19th century, including a national bank, protective tariffs, and internal improvements, to promote national economic self-sufficiency."
 law_usa_chunjingshipinheyaopinfa: "Pure Food and Drug Act"
 law_usa_chunjingshipinheyaopinfa_desc: "The first federal consumer protection law passed by the United States in 1906, prohibiting the interstate sale of adulterated or misbranded food and drugs, leading to the establishment of the Food and Drug Administration."
 law_usa_pinkerton: "Pinkerton"
 law_usa_pinkerton_desc: "A private detective and security agency founded in the United States in the 19th century, often hired by employers to break strikes and undermine unions, effectively acting as a paramilitary police force."
 law_usa_interstatecompact: "Interstate Compact"
 law_usa_interstatecompact_desc: "A written agreement between two or more states permitted by the U.S. Constitution, requiring congressional consent, used to coordinate cross-jurisdictional matters such as transportation, water resources, and criminal extradition."
 law_usa_fbi: "Federal Bureau of Investigation"
 law_usa_fbi_desc: "The principal investigative and domestic intelligence agency under the U.S. Department of Justice, responsible for combating major crimes, counter-espionage, and counter-terrorism, with militarized law enforcement functions."
 law_usa_spoilsystem: "Spoils System"
 law_usa_spoilsystem_desc: "The 19th-century American practice of party-based political patronage, in which the winning party distributed government positions to its supporters, leading to corruption and inefficiency. However this also allows for quicker enactments of goverment policy"
 law_usa_pendleton: "Pendleton Act"
 law_usa_pendleton_desc: "The Civil Service Reform Act of 1883, replacing the spoils system with open competitive examinations and establishing the modern career civil service system in the United States."
 law_usa_manifestdestiny: "Manifest Destiny"
 law_usa_manifestdestiny_desc: "A 19th-century American ideology holding that white Anglo-Saxons were divinely destined to expand across the North American continent, used to justify frontier colonization and the displacement of Native Americans."
 law_usa_bia: "Bureau of Insular Affairs"
 law_usa_bia_desc: "An administrative agency established by the United States after the Spanish-American War, responsible for managing the colonies acquired from Spain, such as the Philippines and Puerto Rico, serving colonial exploitation."
 law_usa_maikaxizhuyi: "McCarthyism"
 law_usa_maikaxizhuyi_desc: "The anti-Communist political witch-hunt instigated by U.S. Senator Joseph McCarthy in the 1950s, using unsubstantiated accusations of 'internal subversion' to investigate and purge government, military, and cultural figures, creating a terror reminiscent of a secret police."
 law_usa_yuanjipeiezhi: "National Origins Formula"
 law_usa_yuanjipeiezhi_desc: "The system established by the U.S. Immigration Act of 1924, setting annual immigration quotas based on the proportion of each nationality in the 1890 census, designed to restrict immigrants from Southern and Eastern Europe, Asia, and Africa."
 law_usa_tafutuohatelifaan: "Taft-Hartley Act"
 law_usa_tafutuohatelifaan_desc: "The Labor-Management Relations Act of 1947, restricting union power by banning secondary boycotts, allowing judicial review of strikes, and permitting states to pass 'right-to-work' laws prohibiting closed shops."
 law_usa_laolianchanlian: "AFL-CIO"
 law_usa_laolianchanlian_desc: "The national trade union federation formed in 1955 by the merger of the American Federation of Labor and the Congress of Industrial Organizations, representing most industry unions and becoming the corporatized collective bargaining body."
