 #loading tips

 concept_sausage_roll_incident: "The Sausage Roll Incident"

 concept_sausage_roll_incident_desc: "The Sausage Roll Incident occured during a game of Victoria 3 in 2025. Legends tell that a player by the name of Izzy was enjoying her fish and chips and began to talk about it to her fellow players, then somehow the conversation shifted to sausage rolls. Someone suggested that you could get a sausage roll in a Chippy (which is false) and this led to a great outburst of laughter as Brexit_good, a player returned, hearing of the heresy of Izzy telling him that greggs sausage rolls are 'Shit'"

 concept_factory_there: "Theres a Factory There!"
 concept_factory_there_desc: "There is little known about the origin of the factory, for all we know about it is that it is there. Where you ask? there I say. is it in India? Denmark? America? the factory is not in one place, it is not in multiple places - the factory just is, and there is nothing that you can do about it"

 concept_noob_russia: "How NOT To Play Russia"
 concept_noob_russia_desc: "We have someone in the team that is very infamous for their performance in one of our MP games. Noob played Russia and gave up all of Poland to Austria and Germany - expectedly he got backstabbed and it ended up being a template for how NOT to play Russia"

 concept_sleeppe: "Sleeppe"
 concept_sleeppe_desc: "Sleeppe is the Glorious leader of the Discord and youtube channel. We all love her and adore her \n \nERROR...\nERROR...\nPLEASE SHE HAS MY FAMILY HOSTAGE LET ME ESCAPE"

 concept_delcom: "Delcom"
 concept_delcom_desc: "Delcom is a master of the art of ragebait. Beware of this skill for you can have a conversation with him for hours whilst you dont realise that he has expertly crafted a tailored persona for the sole purpose of boiling your blood. We all hate Delcom! (Jokingg! - or am I)"
 